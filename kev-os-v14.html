<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#F7F3ED">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Kev OS">
<title>Kev OS</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --cream:#F7F3ED; --cream2:#F0EAE0; --cream3:#E8DFD3; --card:#FFFCF8;
  --border:rgba(28,25,23,0.09); --border2:rgba(28,25,23,0.16); --border3:rgba(28,25,23,0.24);
  --text:#1C1917; --text2:#57534E; --text3:#A8A29E; --dim:#D4CFC9;
  --accent:#C4622D; --accent2:rgba(196,98,45,0.10); --accent3:rgba(196,98,45,0.18);
  --green:#3A6B4A; --green-bg:rgba(58,107,74,0.08); --green-bd:rgba(58,107,74,0.25);
  --amber:#B87A28; --amber-bg:rgba(184,122,40,0.08); --amber-bd:rgba(184,122,40,0.25);
  --red:#A84040; --red-bg:rgba(168,64,64,0.08); --red-bd:rgba(168,64,64,0.25);
  --d-quit:#8B5E3C; --d-health:#3A6B4A; --d-appearance:#6B4E8A;
  --d-gaming:#2D5F8A; --d-social:#8A6B2D; --d-dating:#8A3D5C; --d-finance:#2D7A6A;
  --serif:"Fraunces",Georgia,serif; --sans:"Plus Jakarta Sans",system-ui,sans-serif;
  --r:10px; --r2:16px; --sh:0 2px 12px rgba(28,25,23,0.07),0 1px 3px rgba(28,25,23,0.05);
}
body.great { --cream:#F4EDD9; --cream2:#EDE3C8; --card:#FFFDF5; }
body.tough { --cream:#F2EFE9; --cream2:#EAE6DE; }
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html,body { height:100%; }
body { background:var(--cream); color:var(--text); font-family:var(--sans); font-size:14px; line-height:1.5; min-height:100vh; -webkit-font-smoothing:antialiased; transition:background .8s ease,--cream .8s ease; }
::-webkit-scrollbar { width:3px; } ::-webkit-scrollbar-thumb { background:var(--dim); border-radius:2px; }

/* HEADER */
.hdr { display:flex; align-items:center; justify-content:space-between; padding:11px 18px; background:rgba(247,243,237,0.94); backdrop-filter:blur(16px); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:100; gap:12px; flex-wrap:wrap; }
.logo { font-family:var(--serif); font-size:19px; font-weight:700; letter-spacing:-.02em; color:var(--text); flex-shrink:0; }
.logo em { color:var(--accent); font-style:normal; }
.hdr-center { flex:1; text-align:center; }
.hdr-time { font-family:var(--serif); font-size:15px; font-weight:600; color:var(--text); }
.hdr-date { font-size:10px; color:var(--text3); letter-spacing:.05em; text-transform:uppercase; margin-top:1px; }
.hdr-right { display:flex; align-items:center; gap:7px; flex-shrink:0; }
.sync-chip { display:flex; align-items:center; gap:5px; font-size:11px; color:var(--text3); background:var(--card); border:1px solid var(--border); border-radius:20px; padding:4px 9px; cursor:pointer; transition:all .15s; font-family:var(--sans); }
.sync-chip:hover { color:var(--text); border-color:var(--border2); }
.sdot { width:6px; height:6px; border-radius:50%; background:var(--dim); flex-shrink:0; }
.sdot.ok { background:var(--green); } .sdot.err { background:var(--red); } .sdot.spin { background:var(--amber); animation:blink 1s infinite; }
@keyframes blink { 0%,100%{opacity:1}50%{opacity:.3} }
.dtabs { display:flex; gap:2px; background:var(--cream2); border-radius:8px; padding:3px; }
.dtab { font-family:var(--sans); font-size:11px; font-weight:500; padding:5px 11px; border-radius:5px; border:none; background:transparent; color:var(--text3); cursor:pointer; transition:all .15s; white-space:nowrap; }
.dtab.active { background:var(--card); color:var(--text); box-shadow:var(--sh); }

/* VIEWS */
.view { display:none; } .view.on { display:block; }

/* SHARED COMPONENTS */
.card { background:var(--card); border:1px solid var(--border); border-radius:var(--r2); }
.sec-label { font-size:10px; font-weight:600; letter-spacing:.09em; text-transform:uppercase; color:var(--text3); }
.btn { font-family:var(--sans); font-size:12px; font-weight:500; padding:7px 14px; border-radius:var(--r); border:1px solid var(--border); background:transparent; color:var(--text2); cursor:pointer; transition:all .15s; }
.btn:hover { background:var(--cream2); color:var(--text); }
.btn.ok { background:var(--green-bg); border-color:var(--green-bd); color:var(--green); }
.btn.danger { color:var(--red); }
.btn-row { display:flex; gap:7px; flex-wrap:wrap; margin-top:12px; }
input[type=text],input[type=number],textarea,select { font-family:var(--sans); font-size:13px; color:var(--text); background:var(--cream2); border:1px solid var(--border); border-radius:var(--r); padding:8px 11px; outline:none; width:100%; transition:border-color .15s; }
input:focus,textarea:focus,select:focus { border-color:var(--border2); background:var(--card); }
input::placeholder,textarea::placeholder { color:var(--text3); }
textarea { resize:vertical; line-height:1.6; }
label.lbl { font-size:10px; font-weight:600; color:var(--text3); letter-spacing:.07em; text-transform:uppercase; display:block; margin-bottom:5px; margin-top:10px; }

/* RAG helpers */
.rag-g { border-left-color:var(--green)!important; background:var(--green-bg)!important; }
.rag-am { border-left-color:var(--amber)!important; background:var(--amber-bg)!important; }
.rag-r { border-left-color:var(--red)!important; background:var(--red-bg)!important; }

/* ━━━━━━━━━━ TODAY TAB ━━━━━━━━━━ */
.today-shell { padding:16px 18px 100px; max-width:680px; margin:0 auto; }

/* Morning briefing */
.briefing {
  background:var(--card); border:1px solid var(--border); border-radius:var(--r2);
  padding:24px 22px 20px; margin-bottom:16px; position:relative; overflow:hidden;
  box-shadow:var(--sh);
}
.briefing::before { content:""; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg,var(--accent),var(--d-appearance)); }
.briefing-day { font-family:var(--serif); font-size:28px; font-weight:700; letter-spacing:-.02em; color:var(--text); line-height:1.1; margin-bottom:4px; }
.briefing-date { font-size:12px; color:var(--text3); margin-bottom:18px; }
.briefing-priority { background:var(--cream2); border-radius:var(--r); padding:12px 14px; margin-bottom:16px; border-left:3px solid var(--accent); }
.bp-lbl { font-size:10px; font-weight:600; color:var(--text3); letter-spacing:.08em; text-transform:uppercase; margin-bottom:4px; }
.bp-text { font-family:var(--serif); font-size:15px; font-weight:600; color:var(--text); line-height:1.3; }
.briefing-streaks { display:flex; gap:10px; margin-bottom:18px; flex-wrap:wrap; }
.bs-pill { display:flex; flex-direction:column; align-items:center; background:var(--cream2); border-radius:var(--r); padding:10px 14px; flex:1; min-width:80px; }
.bs-num { font-family:var(--serif); font-size:30px; font-weight:700; line-height:1; letter-spacing:-.04em; color:var(--text); }
.bs-num.milestone { color:var(--accent); }
.bs-lbl { font-size:10px; color:var(--text3); margin-top:3px; text-align:center; }
.bs-milestone-line { font-size:10px; color:var(--accent); font-style:italic; margin-top:2px; text-align:center; }
.briefing-checkin-btn { width:100%; padding:12px; background:var(--accent); border:none; border-radius:var(--r); color:#fff; font-family:var(--sans); font-size:14px; font-weight:600; cursor:pointer; transition:background .15s; }
.briefing-checkin-btn:hover { background:#B35826; }
.briefing-done { display:flex; align-items:center; gap:8px; color:var(--text3); font-size:13px; padding:8px 0; }

/* Now block */
.now-card { padding:18px 20px; margin-bottom:12px; border-left:3px solid var(--accent); }
.now-eyebrow { font-size:10px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--text3); margin-bottom:6px; display:flex; align-items:center; gap:6px; }
.pip { width:7px; height:7px; border-radius:50%; background:var(--accent); animation:blink 2.5s infinite; flex-shrink:0; }
.now-block { font-family:var(--serif); font-size:22px; font-weight:700; letter-spacing:-.02em; color:var(--text); margin-bottom:8px; line-height:1.2; }
.now-progress { height:4px; background:var(--cream2); border-radius:2px; overflow:hidden; margin-bottom:6px; }
.now-fill { height:100%; background:var(--accent); border-radius:2px; transition:width .5s ease; }
.now-next { font-size:12px; color:var(--text3); }
.now-next strong { color:var(--text2); }
.day-progress-row { display:flex; align-items:center; gap:8px; margin-top:8px; }
.day-prog-bar { flex:1; height:3px; background:var(--cream2); border-radius:2px; overflow:hidden; }
.day-prog-fill { height:100%; background:var(--green); border-radius:2px; transition:width .4s; }
.day-prog-label { font-size:11px; color:var(--text3); flex-shrink:0; }

/* Tasks */
.tasks-section { margin-bottom:14px; }
.tasks-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.todo-add-row { display:flex; gap:7px; margin-bottom:8px; }
.todo-inp { flex:1; min-width:0; font-size:13px; }
.todo-obj-sel { width:130px; flex-shrink:0; font-size:12px; padding:8px 8px; }
.todo-add-btn { width:38px; height:38px; background:var(--accent); border:none; border-radius:var(--r); color:#fff; font-size:22px; font-weight:300; cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center; line-height:1; transition:background .15s; }
.todo-add-btn:hover { background:#B35826; }
.todo-list { display:flex; flex-direction:column; gap:5px; }
.todo-item { display:flex; align-items:flex-start; gap:9px; padding:9px 12px; background:var(--card); border:1px solid var(--border); border-radius:var(--r); transition:all .15s; }
.todo-item:hover { border-color:var(--border2); }
.todo-item.ti-done { opacity:.45; }
.todo-item.ti-done .todo-text { text-decoration:line-through; color:var(--text3); }
.todo-chk { width:17px; height:17px; border-radius:50%; border:1.5px solid var(--dim); flex-shrink:0; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:700; transition:all .15s; margin-top:1px; }
.ti-done .todo-chk { background:var(--green); border-color:var(--green); color:#fff; }
.todo-text { flex:1; font-size:13px; color:var(--text); line-height:1.4; cursor:pointer; }
.todo-tag { font-size:10px; font-weight:500; color:var(--text3); background:var(--cream2); border:1px solid var(--border); border-radius:6px; padding:1px 6px; flex-shrink:0; white-space:nowrap; }
.todo-del { font-size:16px; color:var(--text3); background:none; border:none; cursor:pointer; padding:0 2px; line-height:1; opacity:0; transition:opacity .15s; flex-shrink:0; }
.todo-item:hover .todo-del { opacity:1; }
.todo-empty { font-size:13px; color:var(--text3); padding:12px 0; text-align:center; font-style:italic; }
.todo-item.ti-surfaced { border-color:var(--accent); background:var(--accent2); order:-1; }
.todo-item.ti-surfaced .todo-text { color:var(--text); font-weight:500; }
.ti-surface-dot { width:6px; height:6px; border-radius:50%; background:var(--accent); flex-shrink:0; margin-top:5px; }

/* Schedule in Today */
.sched-section { margin-bottom:14px; }
.sched-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.sched-edit-btn { font-size:11px; color:var(--text3); background:none; border:none; cursor:pointer; font-family:var(--sans); padding:3px 7px; border-radius:5px; transition:all .15s; }
.sched-edit-btn:hover { background:var(--cream2); color:var(--text); }
.sched-timeline { display:flex; flex-direction:column; gap:4px; }
.sched-row { display:flex; align-items:flex-start; gap:10px; padding:9px 12px; background:var(--card); border:1px solid var(--border); border-radius:var(--r); transition:all .15s; }
.sched-row.sr-now { border-color:var(--accent); background:var(--accent2); border-left:3px solid var(--accent); }
.sched-row.sr-past { opacity:.4; }
.sched-row.sr-disabled { opacity:.3; text-decoration:line-through; }
.sr-time { font-family:var(--serif); font-size:13px; font-weight:600; color:var(--text3); min-width:40px; flex-shrink:0; padding-top:1px; }
.sched-row.sr-now .sr-time { color:var(--accent); }
.sr-label { font-size:13px; color:var(--text2); flex:1; line-height:1.4; }
.sched-row.sr-now .sr-label { color:var(--text); font-weight:500; }
.sr-domain { font-size:10px; color:var(--text3); flex-shrink:0; }
.sr-now-badge { font-size:10px; font-weight:600; color:var(--accent); background:var(--accent2); border-radius:4px; padding:1px 6px; flex-shrink:0; }

/* Schedule edit mode */
.sched-edit-mode { display:none; }
.sched-edit-mode.on { display:block; }
.sched-edit-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; flex-wrap:wrap; gap:8px; }
.sched-done-btn { font-family:var(--sans); font-size:12px; font-weight:600; padding:7px 16px; border-radius:var(--r); border:none; background:var(--accent); color:#fff; cursor:pointer; }
.edit-block { background:var(--card); border:1px solid var(--border); border-radius:var(--r); margin-bottom:7px; overflow:hidden; }
.eb-header { display:flex; align-items:center; gap:9px; padding:11px 13px; cursor:pointer; }
.eb-header:hover { background:var(--cream2); }
.eb-dot { width:9px; height:9px; border-radius:50%; background:var(--dim); border:1.5px solid var(--border2); flex-shrink:0; cursor:pointer; }
.eb-dot.active { background:var(--accent); border-color:var(--accent); }
.eb-dot.disabled { background:var(--dim); border-color:var(--border); }
.eb-time { font-family:var(--serif); font-size:14px; font-weight:700; color:var(--accent); min-width:42px; }
.eb-name { flex:1; font-size:13px; color:var(--text); }
.eb-chevron { font-size:10px; color:var(--text3); transition:transform .2s; }
.edit-block.open .eb-chevron { transform:rotate(180deg); }
.eb-body { display:none; padding:0 13px 13px; border-top:1px solid var(--border); }
.edit-block.open .eb-body { display:block; }
.time-row { display:flex; align-items:center; gap:10px; margin:10px 0 6px; }
.time-row label { font-size:11px; color:var(--text3); flex-shrink:0; }
.time-row input[type=range] { flex:1; accent-color:var(--accent); cursor:pointer; }
.time-val { font-family:var(--serif); font-size:15px; font-weight:700; color:var(--accent); min-width:38px; text-align:right; flex-shrink:0; }
.sched-add-block { display:flex; align-items:center; gap:9px; padding:11px 13px; border:1px dashed var(--border2); border-radius:var(--r); cursor:pointer; transition:all .15s; margin-bottom:10px; }
.sched-add-block:hover { border-color:var(--accent); background:var(--accent2); }
.sab-icon { font-size:18px; color:var(--accent); font-weight:300; line-height:1; }
.sab-text { font-size:13px; color:var(--text3); }
.toggle-row { display:flex; align-items:center; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--border); margin-bottom:10px; }
.toggle-label { font-size:13px; color:var(--text2); }
.toggle-sub { font-size:11px; color:var(--text3); }
.toggle { position:relative; width:42px; height:22px; flex-shrink:0; }
.toggle input { opacity:0; width:0; height:0; position:absolute; }
.tgl-track { position:absolute; inset:0; background:var(--dim); border-radius:11px; cursor:pointer; transition:background .2s; }
.toggle input:checked + .tgl-track { background:var(--accent); }
.tgl-thumb { position:absolute; top:2px; left:2px; width:18px; height:18px; background:#fff; border-radius:50%; transition:transform .2s; pointer-events:none; box-shadow:0 1px 3px rgba(0,0,0,.15); }
.toggle input:checked ~ .tgl-thumb { transform:translateX(20px); }

/* Ship log */
.log-section { margin-bottom:14px; }
.log-feed { display:flex; flex-direction:column; gap:5px; }
.log-entry { display:flex; align-items:flex-start; gap:9px; padding:9px 12px; background:var(--card); border:1px solid var(--border); border-radius:var(--r); }
.le-time { font-size:10px; color:var(--text3); min-width:38px; flex-shrink:0; padding-top:2px; font-family:var(--sans); }
.le-content { flex:1; }
.le-what { font-size:12px; font-weight:500; color:var(--text3); margin-bottom:1px; }
.le-answer { font-size:13px; color:var(--text); }
.le-edit { font-size:11px; color:var(--text3); background:none; border:none; cursor:pointer; font-family:var(--sans); padding:0; flex-shrink:0; }
.log-gap { display:flex; align-items:center; gap:9px; padding:8px 12px; background:var(--cream2); border:1px dashed var(--border2); border-radius:var(--r); cursor:pointer; transition:all .15s; }
.log-gap:hover { border-color:var(--accent); }
.lg-time { font-size:10px; color:var(--text3); min-width:38px; flex-shrink:0; }
.lg-text { font-size:12px; color:var(--text3); flex:1; }
.lg-tap { font-size:11px; color:var(--accent); flex-shrink:0; }
.log-empty { font-size:13px; color:var(--text3); padding:16px 12px; text-align:center; font-style:italic; }

/* Moments */
.moments-section { margin-bottom:14px; }
.moment-inp-wrap { display:flex; gap:7px; margin-bottom:8px; }
.moment-inp { flex:1; font-size:13px; }
.moment-add-btn { width:38px; height:38px; background:var(--cream2); border:1px solid var(--border); border-radius:var(--r); color:var(--text2); font-size:20px; font-weight:300; cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center; line-height:1; transition:all .15s; }
.moment-add-btn:hover { background:var(--card); border-color:var(--border2); }
.moment-list { display:flex; flex-direction:column; gap:5px; }
.moment-item { display:flex; align-items:flex-start; gap:9px; padding:9px 12px; background:var(--card); border:1px solid var(--border); border-radius:var(--r); }
.mi-time { font-size:10px; color:var(--text3); min-width:38px; flex-shrink:0; padding-top:2px; }
.mi-text { flex:1; font-size:13px; color:var(--text); line-height:1.4; }
.mi-del { font-size:14px; color:var(--text3); background:none; border:none; cursor:pointer; padding:0 2px; line-height:1; opacity:0; transition:opacity .15s; }
.moment-item:hover .mi-del { opacity:1; }
.moments-empty { font-size:12px; color:var(--text3); padding:8px 0; font-style:italic; }

/* Journal in Today */
.journal-section { margin-bottom:14px; }
.journal-prompt { font-size:13px; color:var(--text2); font-style:italic; line-height:1.6; margin-bottom:10px; padding-left:11px; border-left:2px solid var(--accent); }
.journal-ta { min-height:90px; font-size:13px; line-height:1.7; }

/* Check-in card flow */
.checkin-overlay { position:fixed; inset:0; background:var(--cream); z-index:300; overflow-y:auto; }
.checkin-header { display:flex; align-items:center; justify-content:space-between; padding:14px 18px; border-bottom:1px solid var(--border); background:rgba(247,243,237,0.94); backdrop-filter:blur(12px); position:sticky; top:0; }
.checkin-title { font-family:var(--serif); font-size:16px; font-weight:700; color:var(--text); }
.checkin-close { font-size:22px; color:var(--text3); background:none; border:none; cursor:pointer; font-family:var(--sans); }
.checkin-progress { display:flex; align-items:center; gap:5px; padding:16px 18px 8px; }
.cp-dot { width:7px; height:7px; border-radius:50%; background:var(--dim); transition:all .25s; }
.cp-dot.cp-active { background:var(--accent); transform:scale(1.3); }
.cp-dot.cp-done { background:var(--green); }
.checkin-body { padding:16px 18px 32px; max-width:520px; margin:0 auto; }
.ci-card { background:var(--card); border:1px solid var(--border); border-radius:var(--r2); padding:24px 20px; box-shadow:var(--sh); animation:cardIn .28s ease; }
@keyframes cardIn { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
.ci-eyebrow { font-size:10px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--text3); margin-bottom:9px; }
.ci-q { font-family:var(--serif); font-size:21px; font-weight:600; line-height:1.35; color:var(--text); margin-bottom:5px; }
.ci-sub { font-size:13px; color:var(--text3); line-height:1.5; margin-bottom:18px; }
.ci-opts { display:flex; flex-direction:column; gap:8px; }
.ci-opt { width:100%; padding:13px 16px; border-radius:var(--r); border:1px solid var(--border); background:transparent; font-family:var(--sans); font-size:14px; font-weight:500; color:var(--text2); cursor:pointer; transition:all .15s; text-align:left; }
.ci-opt:hover { background:var(--cream2); border-color:var(--border2); color:var(--text); }
.ci-opt.sel { background:var(--accent2); border-color:rgba(196,98,45,.3); color:var(--accent); }
.ci-opt.good:hover,.ci-opt.good.sel { background:var(--green-bg); border-color:var(--green-bd); color:var(--green); }
.ci-opt.bad:hover,.ci-opt.bad.sel { background:var(--red-bg); border-color:var(--red-bd); color:var(--red); }
.ci-track-pair { display:flex; flex-direction:column; gap:10px; margin-top:4px; }
.ci-track { background:var(--cream2); border-radius:var(--r); padding:13px; }
.ci-track-label { font-size:11px; font-weight:600; color:var(--text3); letter-spacing:.06em; text-transform:uppercase; margin-bottom:8px; }
.ci-track-streak { font-size:12px; color:var(--text3); margin-bottom:8px; }
.ci-track-btns { display:flex; gap:7px; }
.ci-track-btn { flex:1; padding:10px; border-radius:var(--r); border:1px solid var(--border); background:transparent; font-family:var(--sans); font-size:13px; font-weight:500; cursor:pointer; transition:all .15s; }
.ci-track-btn.sel-good { background:var(--green-bg); border-color:var(--green-bd); color:var(--green); }
.ci-track-btn.sel-bad { background:var(--red-bg); border-color:var(--red-bd); color:var(--red); }
.sweep-list { display:flex; flex-direction:column; gap:1px; margin-top:8px; }
.sweep-row { display:flex; align-items:center; gap:8px; padding:9px 0; border-bottom:1px solid var(--border); }
.sweep-row:last-child { border-bottom:none; }
.sweep-name { flex:1; font-size:13px; font-weight:500; color:var(--text); }
.sweep-btns { display:flex; gap:4px; }
.sw-btn { font-size:11px; padding:5px 9px; border-radius:6px; border:1px solid var(--border); background:transparent; color:var(--text3); cursor:pointer; font-family:var(--sans); transition:all .12s; font-weight:500; }
.sw-btn:hover { background:var(--cream2); color:var(--text); }
.sw-btn.sw-g { background:var(--green-bg); border-color:var(--green-bd); color:var(--green); }
.sw-btn.sw-am { background:var(--amber-bg); border-color:var(--amber-bd); color:var(--amber); }
.sw-btn.sw-r { background:var(--red-bg); border-color:var(--red-bd); color:var(--red); }
.sched-review-list { display:flex; flex-direction:column; gap:5px; margin-top:8px; }
.sr-item { display:flex; align-items:center; gap:8px; padding:8px 0; border-bottom:1px solid var(--border); }
.sr-item:last-child { border-bottom:none; }
.sr-item-time { font-size:11px; color:var(--text3); min-width:38px; flex-shrink:0; }
.sr-item-label { flex:1; font-size:12px; color:var(--text2); }
.sr-item-btns { display:flex; gap:3px; }
.sri-btn { font-size:10px; padding:4px 7px; border-radius:5px; border:1px solid var(--border); background:transparent; color:var(--text3); cursor:pointer; font-family:var(--sans); transition:all .12s; font-weight:500; white-space:nowrap; }
.sri-btn.sel-on { background:var(--green-bg); border-color:var(--green-bd); color:var(--green); }
.sri-btn.sel-late { background:var(--amber-bg); border-color:var(--amber-bd); color:var(--amber); }
.sri-btn.sel-skip { background:var(--red-bg); border-color:var(--red-bd); color:var(--red); }
.ci-note-toggle { font-size:12px; color:var(--text3); background:none; border:none; cursor:pointer; font-family:var(--sans); margin-top:10px; display:block; padding:3px 0; }
.ci-note-toggle:hover { color:var(--text2); }
.ci-ta { margin-top:8px; min-height:70px; font-size:13px; }
.ci-nav { display:flex; align-items:center; justify-content:space-between; padding:14px 18px 20px; max-width:520px; margin:0 auto; }
.ci-nav-btn { font-family:var(--sans); font-size:13px; font-weight:500; padding:10px 20px; border-radius:var(--r); border:1px solid var(--border); background:transparent; color:var(--text2); cursor:pointer; transition:all .15s; }
.ci-nav-btn:hover { background:var(--cream2); }
.ci-nav-btn:disabled { opacity:.35; pointer-events:none; }
.ci-nav-btn.primary { background:var(--accent); border-color:var(--accent); color:#fff; }
.ci-nav-btn.primary:hover { background:#B35826; }
.checkin-done { text-align:center; padding:40px 20px; }
.cd-icon { font-size:44px; margin-bottom:16px; color:var(--accent); font-family:var(--serif); font-weight:700; }
.cd-title { font-family:var(--serif); font-size:24px; font-weight:700; color:var(--text); margin-bottom:8px; }
.cd-sub { font-size:14px; color:var(--text3); line-height:1.6; max-width:300px; margin:0 auto 24px; }

/* Slip banner */
.slip-banner { background:rgba(196,98,45,0.08); border:1px solid rgba(196,98,45,0.22); border-radius:var(--r); padding:10px 14px; margin-bottom:12px; display:flex; align-items:center; justify-content:space-between; gap:10px; }
.sb-text { font-size:12px; color:var(--accent); line-height:1.4; }
.sb-text strong { display:block; font-weight:600; margin-bottom:1px; }
.sb-btns { display:flex; gap:6px; flex-shrink:0; }
.sb-log { font-size:11px; padding:5px 10px; border-radius:6px; background:var(--accent); border:none; color:#fff; cursor:pointer; font-family:var(--sans); font-weight:500; }
.sb-dismiss { font-size:11px; padding:5px 8px; border-radius:6px; background:transparent; border:1px solid var(--border); color:var(--text3); cursor:pointer; font-family:var(--sans); }

/* ━━━━━━━━━━ DASHBOARD TAB ━━━━━━━━━━ */
.dash-shell { padding:16px 18px 60px; max-width:1400px; margin:0 auto; }

/* Objectives */
.obj-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:9px; margin-bottom:16px; }
@media(max-width:1000px){.obj-grid{grid-template-columns:repeat(3,1fr);}}
@media(max-width:600px){.obj-grid{grid-template-columns:repeat(2,1fr);}}
.obj-card { background:var(--card); border:1px solid var(--border); border-radius:var(--r2); padding:13px 14px; display:flex; flex-direction:column; gap:7px; cursor:pointer; transition:all .2s; position:relative; overflow:hidden; }
.obj-card::before { content:""; position:absolute; top:0; left:0; right:0; height:3px; background:var(--dim); transition:background .3s; }
.obj-card:hover { border-color:var(--border2); transform:translateY(-1px); box-shadow:var(--sh); }
.obj-card.oc-g::before{background:var(--green);} .obj-card.oc-g{border-color:var(--green-bd);background:var(--green-bg);}
.obj-card.oc-am::before{background:var(--amber);} .obj-card.oc-am{border-color:var(--amber-bd);background:var(--amber-bg);}
.obj-card.oc-r::before{background:var(--red);} .obj-card.oc-r{border-color:var(--red-bd);background:var(--red-bg);}
.obj-card.oc-none::before{background:var(--dim);} .obj-card.oc-none{border-color:var(--border2);background:var(--card);}
.oc-num { font-size:10px; color:var(--text3); font-weight:500; }
.oc-name { font-size:11px; color:var(--text2); font-weight:500; }
.oc-next { font-family:var(--serif); font-size:13px; font-weight:600; color:var(--text); line-height:1.3; flex:1; }
.obj-card.oc-g .oc-next{color:var(--green);} .obj-card.oc-am .oc-next{color:var(--amber);} .obj-card.oc-r .oc-next{color:var(--red);}
.oc-next.complete{font-style:italic;opacity:.7;}
.oc-bar { height:2px; background:var(--cream3); border-radius:1px; overflow:hidden; margin-top:2px; }
.oc-fill { height:100%; border-radius:1px; background:var(--text3); transition:width .5s; }
.obj-card.oc-g .oc-fill{background:var(--green);} .obj-card.oc-am .oc-fill{background:var(--amber);} .obj-card.oc-r .oc-fill{background:var(--red);}
.oc-pct { font-size:10px; color:var(--text3); text-align:right; }

/* Domain grid */
@media(max-width:1000px){.dom-grid{grid-template-columns:repeat(3,1fr);}}
@media(max-width:600px){.dom-grid{grid-template-columns:repeat(2,1fr);}}
.dom-tile { background:var(--card); border:1px solid var(--border); border-left:3px solid var(--dim); border-radius:var(--r2); padding:13px 14px; display:flex; flex-direction:column; gap:7px; transition:all .2s; }
.dom-tile.rag-g{border-left-color:var(--green);background:var(--green-bg);}
.dom-tile.rag-am{border-left-color:var(--amber);background:var(--amber-bg);}
.dom-tile.rag-r{border-left-color:var(--red);background:var(--red-bg);}
.dt-top { display:flex; align-items:center; justify-content:space-between; }
.dt-name { font-size:10px; font-weight:600; letter-spacing:.07em; text-transform:uppercase; color:var(--text3); }
.dom-tile.rag-g .dt-name{color:var(--green);} .dom-tile.rag-am .dt-name{color:var(--amber);} .dom-tile.rag-r .dt-name{color:var(--red);}
.rag-badge { width:27px; height:27px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:var(--serif); font-size:11px; font-weight:700; flex-shrink:0; border:1.5px solid var(--border); background:var(--cream2); color:var(--text3); }
.rag-badge.rb-g{background:var(--green-bg);color:var(--green);border-color:var(--green-bd);}
.rag-badge.rb-am{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-bd);}
.rag-badge.rb-r{background:var(--red-bg);color:var(--red);border-color:var(--red-bd);}
.dt-action { font-size:12px; color:var(--text3); line-height:1.4; font-weight:500; }
.dom-tile.rag-g .dt-action,.dom-tile.rag-am .dt-action,.dom-tile.rag-r .dt-action{color:var(--text);}
.dt-action.complete{color:var(--text3);font-style:italic;font-weight:400;}

/* Streaks */
.streaks-row { display:flex; gap:9px; margin-bottom:16px; flex-wrap:wrap; }
.streak-card { background:var(--card); border:1px solid var(--border); border-radius:var(--r2); padding:13px 16px; display:flex; align-items:center; gap:14px; flex:1; min-width:140px; }
.sk-num { font-family:var(--serif); font-size:34px; font-weight:700; line-height:1; letter-spacing:-.04em; color:var(--text); flex-shrink:0; }
.sk-num.milestone { color:var(--accent); }
.sk-info { flex:1; }
.sk-label { font-size:11px; font-weight:500; color:var(--text2); }
.sk-sub { font-size:10px; color:var(--text3); margin-top:2px; }
.sk-milestone-text { font-size:10px; color:var(--accent); font-style:italic; margin-top:2px; }

/* 7-day history */
.history-row { margin-bottom:16px; }
.hist-grid { display:flex; flex-direction:column; gap:5px; }
.hg-row { display:flex; align-items:center; gap:6px; }
.hg-label { font-size:10px; color:var(--text3); width:80px; flex-shrink:0; white-space:nowrap; }
.hg-dots { display:flex; gap:3px; flex:1; }
.hg-dot { flex:1; height:14px; border-radius:3px; background:var(--cream2); }
.hg-dot.g{background:rgba(58,107,74,.2);} .hg-dot.am{background:rgba(184,122,40,.18);} .hg-dot.r{background:rgba(168,64,64,.18);}
.hg-dot.today{outline:1.5px solid var(--border2);outline-offset:1px;}

/* ━━━━━━━━━━ INSIGHTS TAB ━━━━━━━━━━ */
.insights-shell { padding:16px 18px 60px; max-width:720px; margin:0 auto; }
.insights-section { margin-bottom:22px; }
.week-nav { display:flex; align-items:center; gap:10px; margin-bottom:16px; }
.wn-btn { font-size:16px; background:var(--card); border:1px solid var(--border); border-radius:var(--r); width:32px; height:32px; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--text2); transition:all .15s; flex-shrink:0; }
.wn-btn:hover { background:var(--cream2); }
.wn-label { font-family:var(--serif); font-size:15px; font-weight:600; color:var(--text); flex:1; text-align:center; }

/* Summary line */
.summary-card { background:var(--card); border:1px solid var(--border); border-radius:var(--r2); padding:18px 20px; margin-bottom:16px; border-left:3px solid var(--accent); }
.summary-week { font-size:11px; color:var(--text3); text-transform:uppercase; letter-spacing:.08em; font-weight:600; margin-bottom:6px; }
.summary-text { font-family:var(--serif); font-size:17px; font-weight:600; color:var(--text); line-height:1.45; }

/* Domain bars */
.domain-bars { display:flex; flex-direction:column; gap:10px; }
.db-row { display:flex; flex-direction:column; gap:4px; }
.db-header { display:flex; align-items:center; justify-content:space-between; }
.db-name { font-size:12px; font-weight:500; color:var(--text2); }
.db-score { font-family:var(--serif); font-size:13px; font-weight:700; color:var(--text); }
.db-bar { height:7px; background:var(--cream2); border-radius:4px; overflow:hidden; }
.db-fill { height:100%; border-radius:4px; transition:width .5s; }
.db-sub { font-size:10px; color:var(--text3); }

/* Objectives movement */
.obj-movement { display:flex; flex-direction:column; gap:8px; }
.om-row { background:var(--card); border:1px solid var(--border); border-radius:var(--r); padding:12px 14px; display:flex; align-items:center; gap:10px; }
.om-name { font-size:13px; font-weight:500; color:var(--text); flex:1; }
.om-change { font-family:var(--serif); font-size:13px; font-weight:700; flex-shrink:0; }
.om-change.up { color:var(--green); } .om-change.down { color:var(--red); } .om-change.same { color:var(--text3); }
.om-detail { font-size:11px; color:var(--text3); }

/* Tasks done/outstanding */
.tasks-split { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
@media(max-width:500px){.tasks-split{grid-template-columns:1fr;}}
.ts-col { background:var(--card); border:1px solid var(--border); border-radius:var(--r2); padding:14px; }
.ts-title { font-size:11px; font-weight:600; color:var(--text3); letter-spacing:.07em; text-transform:uppercase; margin-bottom:10px; }
.ts-item { font-size:12px; color:var(--text2); padding:5px 0; border-bottom:1px solid var(--border); line-height:1.4; }
.ts-item:last-child { border-bottom:none; }
.ts-item .ts-obj { font-size:10px; color:var(--text3); }
.ts-empty { font-size:12px; color:var(--text3); font-style:italic; }

/* Quit timeline */
.quit-timeline { display:flex; flex-direction:column; gap:14px; }
.qt-row { display:flex; flex-direction:column; gap:6px; }
.qt-label { display:flex; align-items:center; justify-content:space-between; }
.qt-name { font-size:12px; font-weight:500; color:var(--text2); }
.qt-streak { font-family:var(--serif); font-size:14px; font-weight:700; color:var(--text); }
.qt-dots { display:flex; gap:4px; }
.qt-dot { flex:1; height:28px; border-radius:5px; background:var(--cream2); display:flex; align-items:center; justify-content:center; }
.qt-dot.qd-clean { background:rgba(58,107,74,.15); }
.qt-dot.qd-slip { background:rgba(168,64,64,.15); }
.qt-dot.qd-none { background:var(--cream2); }
.qt-day-label { display:flex; gap:4px; margin-top:2px; }
.qt-dl { flex:1; font-size:9px; color:var(--text3); text-align:center; }
.qt-pb { font-size:10px; color:var(--text3); margin-top:2px; }

/* Journal entries in Insights */
.journal-entries { display:flex; flex-direction:column; gap:8px; }
.je-item { background:var(--card); border:1px solid var(--border); border-radius:var(--r); overflow:hidden; }
.je-header { display:flex; align-items:center; justify-content:space-between; padding:11px 14px; cursor:pointer; }
.je-header:hover { background:var(--cream2); }
.je-date { font-size:12px; font-weight:500; color:var(--text2); }
.je-preview { font-size:12px; color:var(--text3); flex:1; padding:0 10px; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
.je-chevron { font-size:10px; color:var(--text3); transition:transform .2s; }
.je-item.open .je-chevron { transform:rotate(180deg); }
.je-body { display:none; padding:0 14px 14px; font-size:13px; color:var(--text2); line-height:1.7; border-top:1px solid var(--border); }
.je-item.open .je-body { display:block; }
.moments-insights { display:flex; flex-direction:column; gap:5px; }
.mi-ins { display:flex; align-items:flex-start; gap:8px; padding:8px 0; border-bottom:1px solid var(--border); }
.mi-ins:last-child { border-bottom:none; }
.mi-ins-date { font-size:10px; color:var(--text3); min-width:50px; flex-shrink:0; padding-top:2px; }
.mi-ins-text { font-size:13px; color:var(--text2); line-height:1.4; }

/* Weekly reflection */
.reflection-card { background:var(--card); border:1px solid var(--amber-bd); border-radius:var(--r2); padding:18px; margin-bottom:16px; border-left:3px solid var(--amber); }
.rc-title { font-family:var(--serif); font-size:15px; font-weight:600; color:var(--text); margin-bottom:6px; }
.rc-sub { font-size:12px; color:var(--text3); margin-bottom:12px; line-height:1.5; }

/* Export */
.export-row { display:flex; gap:8px; flex-wrap:wrap; margin-top:8px; }
.export-btn { font-family:var(--sans); font-size:12px; font-weight:500; padding:8px 16px; border-radius:var(--r); border:1px solid var(--green-bd); background:var(--green-bg); color:var(--green); cursor:pointer; transition:all .15s; }
.export-btn:hover { background:var(--green-bd); }

/* MOBILE TAB BAR */
.tbar { display:none; position:fixed; bottom:0; left:0; right:0; background:rgba(247,243,237,0.96); backdrop-filter:blur(16px); border-top:1px solid var(--border); padding:6px 10px calc(6px + env(safe-area-inset-bottom)); z-index:200; }
.tbar-inner { display:flex; gap:2px; max-width:480px; margin:0 auto; }
.tbar-btn { flex:1; display:flex; flex-direction:column; align-items:center; gap:2px; padding:7px 4px; border-radius:var(--r); border:none; background:transparent; color:var(--text3); cursor:pointer; font-family:var(--sans); font-size:10px; font-weight:500; transition:all .15s; }
.tbar-btn.active { color:var(--accent); background:var(--accent2); }
.tbar-icon { font-size:18px; line-height:1; }

/* MODAL */
.modal-bg { position:fixed; inset:0; background:rgba(28,25,23,.5); z-index:400; display:flex; align-items:center; justify-content:center; padding:16px; backdrop-filter:blur(4px); animation:fadein .2s ease; }
@keyframes fadein{from{opacity:0}to{opacity:1}}
.modal { background:var(--card); border:1px solid var(--border); border-radius:var(--r2); padding:22px; max-width:500px; width:100%; max-height:88vh; overflow-y:auto; box-shadow:0 16px 48px rgba(28,25,23,.18); }
.modal-hd { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
.modal-hd h3 { font-family:var(--serif); font-size:17px; font-weight:700; color:var(--text); }
.modal-x { background:none; border:none; color:var(--text3); cursor:pointer; font-size:21px; line-height:1; font-family:var(--sans); }
.setup-step { display:flex; gap:9px; margin-bottom:10px; }
.ss-n { width:20px; height:20px; border-radius:50%; background:var(--cream2); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:600; color:var(--text3); flex-shrink:0; margin-top:1px; }
.ss-t { font-size:12px; color:var(--text2); line-height:1.6; }
.ss-t strong{color:var(--text);} .ss-t a{color:var(--accent);text-decoration:none;} .ss-t a:hover{text-decoration:underline;}
.inp-row { display:flex; gap:7px; flex-wrap:wrap; margin-top:5px; }
.inp-row input { flex:1; min-width:150px; }

/* Milestone modal */
.ms-item { display:flex; align-items:center; gap:9px; padding:9px 11px; background:var(--cream2); border-radius:var(--r); border:1px solid var(--border); cursor:pointer; transition:all .15s; margin-bottom:5px; }
.ms-item:hover { border-color:var(--border2); }
.ms-item.done { background:var(--green-bg); border-color:var(--green-bd); }
.ms-chk { width:17px; height:17px; border-radius:50%; border:1.5px solid var(--dim); flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:700; }
.ms-item.done .ms-chk { background:var(--green); border-color:transparent; color:#fff; }
.ms-text { font-size:13px; color:var(--text2); } .ms-item.done .ms-text { color:var(--text); }

/* Celebration */
.cel-bg { position:fixed; inset:0; background:var(--cream); z-index:999; display:flex; flex-direction:column; align-items:center; justify-content:center; animation:celIn .4s ease; cursor:pointer; }
@keyframes celIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.cel-num { font-family:var(--serif); font-size:96px; font-weight:700; color:var(--accent); line-height:1; animation:celNum .6s ease; }
@keyframes celNum{from{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}}
.cel-label { font-family:var(--serif); font-size:21px; font-weight:600; color:var(--text); margin-top:14px; text-align:center; max-width:300px; }
.cel-sub { font-size:13px; color:var(--text3); margin-top:8px; }

/* TOAST */
.toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%) translateY(60px); background:var(--text); color:var(--cream); font-family:var(--sans); font-size:12px; padding:9px 18px; border-radius:40px; z-index:888; transition:transform .25s; pointer-events:none; max-width:88vw; text-align:center; white-space:nowrap; }

function todayKey(){ return new Date().toISOString().split('T')[0]; }
function loadLocal(){ try{ return JSON.parse(localStorage.getItem('kevos10')||'{}')} catch{return {};} }
function saveLocal(s){ localStorage.setItem('kevos10',JSON.stringify(s)); }
function getConfig(){ return {binId:localStorage.getItem('kv_bin')||'',apiKey:localStorage.getItem('kv_key')||''} }

function getState(){
  const s=loadLocal(), tk=todayKey();
  if(!s.days) s.days={};
  if(!s.days[tk]) s.days[tk]={checks:{},manualRag:{},scheduleLog:{},blockLogs:{},comments:{},journal:'',moments:[],sweepState:{}};
  ['checks','manualRag','scheduleLog','blockLogs','comments','sweepState'].forEach(k=>{if(!s.days[tk][k])s.days[tk][k]={};});
  if(!s.days[tk].moments) s.days[tk].moments=[];
  if(!s.objectives) s.objectives={};
  OBJECTIVES.forEach(o=>{if(!s.objectives[o.id])s.objectives[o.id]={milestones:[],note:'',vo2:34};});
  if(!s.logProgress) s.logProgress={};
  if(!s.logProgress[tk]) s.logProgress[tk]={};
  if(!s.personalBests) s.personalBests={};
  return s;
}

let syncTimer=null;
function mutate(fn){
  const s=getState(); fn(s); saveLocal(s);
  if(syncTimer) clearTimeout(syncTimer);
  syncTimer=setTimeout(()=>cloudPush(s),1500);
}

function mutateRender(fn){ mutate(fn); render(); }

function setSyncUI(state,msg){
  const d=document.getElementById('sdot'),l=document.getElementById('slbl');
  if(d) d.className='sdot'+(state?' '+state:'');
  if(l) l.textContent=msg;
}
async function cloudPull(){
  const {binId,apiKey}=getConfig(); if(!binId||!apiKey){setSyncUI('','local only');return;}
  setSyncUI('spin','syncing...');
  try{
    const r=await fetch(`https://api.jsonbin.io/v3/b/${binId}/latest`,{headers:{'X-Master-Key':apiKey,'X-Bin-Meta':'false'}});
    if(!r.ok) throw new Error(r.status);
    const remote=await r.json(),local=loadLocal(),tk=todayKey();
    const merged={...remote,days:{...(remote.days||{})}};
    if(local.days&&local.days[tk]) merged.days[tk]=local.days[tk];
    if(local.objectives) merged.objectives={...(remote.objectives||{}),...local.objectives};
    saveLocal(merged); setSyncUI('ok','synced'); render();
  }catch{ setSyncUI('err','sync error'); }
}
async function cloudPush(s){
  const {binId,apiKey}=getConfig(); if(!binId||!apiKey){setSyncUI('','local only');return;}
  setSyncUI('spin','saving...');
  try{
    const r=await fetch(`https://api.jsonbin.io/v3/b/${binId}`,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':apiKey},body:JSON.stringify(s)});
    if(!r.ok) throw new Error(r.status);
    setSyncUI('ok','saved');
  }catch{ setSyncUI('err','save error'); }
}

//
//  SCHEDULE HELPERS
//
function toMins(t){ const[h,m]=t.split(':').map(Number); return h*60+m; }
function minsToTime(m){ return String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0'); }
function nowMins(){ const n=new Date(); return n.getHours()*60+n.getMinutes(); }

function getActiveSchedule(dateKey){
  const s=loadLocal(), d=dateKey?new Date(dateKey+'T00:00:00'):new Date(), dow=d.getDay();
  if(s.schedToday&&s.schedToday.date===dateKey&&s.schedToday.blocks) return s.schedToday.blocks;
  if(s.schedTemplates&&s.schedTemplates[dow]) return s.schedTemplates[dow];
  return DEFAULT_SCHEDULES[dow]||DEFAULT_SCHEDULES[0];
}

function getCurrentBlock(){
  const sched=getActiveSchedule(todayKey()).filter(b=>!b.disabled);
  const m=nowMins(); let cur=null,nxt=null;
  for(let i=0;i<sched.length;i++){
    const sm=toMins(sched[i].t),em=i+1<sched.length?toMins(sched[i+1].t):24*60;
    if(m>=sm&&m<em){cur=sched[i];nxt=sched[i+1]||null;break;}
  }
  if(!cur&&sched.length&&m<toMins(sched[0].t)){cur={label:'Morning — starts at '+sched[0].t,t:sched[0].t};nxt=sched[0];}
  if(!cur){cur={label:'Day complete — protect your sleep',t:'22:30'};nxt=null;}
  return{cur,nxt};
}

function blockProgress(){
  const sched=getActiveSchedule(todayKey()).filter(b=>!b.disabled);
  const m=nowMins();
  const done=sched.filter(b=>m>=toMins(b.t)).length;
  return{done,total:sched.length};
}

function blockTimeRemaining(){
  const sched=getActiveSchedule(todayKey()).filter(b=>!b.disabled);
  const m=nowMins();
  for(let i=0;i<sched.length;i++){
    const sm=toMins(sched[i].t),em=i+1<sched.length?toMins(sched[i+1].t):24*60;
    if(m>=sm&&m<em){
      const pct=Math.round((m-sm)/(em-sm)*100);
      return pct;
    }
  }
  return 100;
}

//
//  METRICS
//
function ddiff(d){ if(!d)return 0; const a=new Date(d),b=new Date(); a.setHours(0,0,0,0);b.setHours(0,0,0,0); return Math.max(0,Math.floor((b-a)/86400000)); }
function isRelevant(c){ if(!c.days)return true; return c.days.includes(new Date().getDay()); }

function objectiveScore(aId,dayObj){
  const area=AREAS.find(a=>a.id===aId); if(!area||!dayObj)return 0;
  const rel=area.checks.filter(c=>isRelevant(c)); if(!rel.length)return 0;
  return Math.round(rel.filter(c=>dayObj.checks&&dayObj.checks[c.id]).length/rel.length*100);
}

function blendedScore(aId,dayObj){
  const obj=objectiveScore(aId,dayObj);
  const manual=dayObj&&dayObj.manualRag&&dayObj.manualRag[aId];
  const mn=manual==='green'?100:manual==='amber'?50:manual==='red'?0:null;
  return mn===null?obj:Math.round(obj*0.6+mn*0.4);
}

function ragClass(score){ return score>=70?'g':score>=40?'am':'r'; }
function ragLabel(score){ return score>=70?'G':score>=40?'A':'R'; }
function ragColor(score){ return score>=70?'var(--green)':score>=40?'var(--amber)':'var(--red)'; }

function domainPriority(area,dayObj){
  const rel=area.checks.filter(c=>isRelevant(c)).sort((a,b)=>a.p-b.p);
  const first=rel.find(c=>!dayObj && dayObj.checks && dayObj.checks[c.id]);
  if(first)return{text:first.label,done:false};
  if(rel.length)return{text:'All done today ✓',done:true};
  return{text:area.label,done:false};
}

function objScore(objective){
  const s=getState(),od=s.objectives[objective.id]||{},tk=todayKey();
  // Check for linked todo
  const linkedTodo=getTodos().find(t=>!t.done&&t.date===tk&&t.objId===objective.id);
  const todoNext=linkedTodo?linkedTodo.text:null;

  if(objective.type==='milestones'||objective.type==='physical'){
    if(!objective.milestones.length)return{score:0,next:todoNext||'No milestones set',done:false};
    const done=(od.milestones||[]).filter(Boolean).length;
    const total=objective.milestones.length;
    const pct=Math.round(done/total*100);
    if(done===total)return{score:100,next:'Complete ✓',done:true};
    const nextMs=objective.milestones.find((_,i)=>!(od.milestones||[])[i]);
    return{score:pct,next:todoNext||nextMs||'In progress',done:false};
  }
  if(objective.type==='domain'){
    const scores=[],days=s.days||{};
    for(let i=0;i<14;i++){
      const d=new Date();d.setDate(d.getDate()-i);
      const k=d.toISOString().split('T')[0];
      if(days[k])scores.push(blendedScore(objective.domain,days[k]));
    }
    const avg=scores.length?Math.round(scores.reduce((a,b)=>a+b,0)/scores.length):0;
    const area=AREAS.find(a=>a.id===objective.domain);
    const day=s.days[tk];
    const rel=area?area.checks.filter(c=>isRelevant(c)).sort((a,b)=>a.p-b.p):[];
    const first=rel.find(c=>!day && day.checks && day.checks[c.id]);
    const next=todoNext||(first?first.label:(rel.length?'All done today ✓':'Keep going'));
    return{score:avg,next,done:!first&&rel.length>0&&!todoNext};
  }
  return{score:0,next:todoNext||'—',done:false};
}

const OBJ_INPUT_MAP = {
  finance:  {checks:['qar','morison_a','airbnb','no_impulse']},
  merch:    {checks:['gamedev','committed']},
  physical: {checks:['minox','walk','exercise','football','groomed']},
  people:   {checks:['family','friend','morison_w']},
  women:    {checks:['apps','date','vibe']},
};

function isRelevantOnDate(check, dateKey) {
  if (!check || !check.days) return true;
  return check.days.includes(new Date(dateKey + 'T00:00:00').getDay());
}

function objHealth(objective) {
  const s = loadLocal();
  const od = s.objectives && s.objectives[objective.id] || {};
  const tk = todayKey();
  const map = OBJ_INPUT_MAP[objective.id];
  const linkedTodo = getTodos().find(function(t){ return !t.done && t.date === tk && t.objId === objective.id; });
  const dots = (objective.milestones && objective.milestones.length)
    ? objective.milestones.map(function(_, i){ return !!(od.milestones || [])[i]; })
    : [];
  if (!map) return { rag: 'none', context: linkedTodo ? linkedTodo.text : 'Keep going', dots: dots };
  const allChecks = AREAS.flatMap(function(a){ return a.checks; });
  let totalPossible = 0, totalDone = 0, lastLogged = null, daysLogged = 0;
  for (let i = 0; i < 7; i++) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const k = d.toISOString().split('T')[0];
    const day = s.days && s.days[k];
    const rel = map.checks.filter(function(cid) {
      const c = allChecks.find(function(c){ return c.id === cid; });
      return c ? isRelevantOnDate(c, k) : true;
    });
    if (!rel.length) continue;
    totalPossible += rel.length;
    if (day && Object.keys(day.checks || {}).length > 0) {
      daysLogged++;
      if (lastLogged === null) lastLogged = i;
      totalDone += rel.filter(function(cid){ return day.checks && day.checks[cid]; }).length;
    }
  }
  if (totalPossible === 0 || daysLogged === 0) {
    const nextMs = dots.length ? objective.milestones.find(function(_, i){ return !(od.milestones || [])[i]; }) : null;
    return { rag: 'none', context: linkedTodo ? linkedTodo.text : (nextMs || 'No data yet — start your check-in'), dots: dots };
  }
  const pct = Math.round(totalDone / totalPossible * 100);
  const rag = pct >= 70 ? 'g' : pct >= 40 ? 'am' : 'r';
  let context = '';
  if (linkedTodo) context = linkedTodo.text;
  else if (rag === 'g') context = 'Consistent this week';
  else if (rag === 'am') context = lastLogged > 1 ? (lastLogged + ' days since last input') : 'Showing up — keep going';
  else context = (lastLogged !== null && lastLogged > 0) ? (lastLogged + ' days since last input') : 'Needs attention this week';
  return { rag: rag, context: context, dots: dots };
}

function morningProtocolStreak(){
  const s=loadLocal(); let n=0; const d=new Date();
  for(let i=0;i<90;i++){
    if(i>0)d.setDate(d.getDate()-1);
    const k=d.toISOString().split('T')[0];
    const day=s.days&&s.days[k]; if(!day)break;
    const ok=day.checks&&day.checks.minox&&day.checks.walk&&day.checks.no_smoke&&day.checks.no_pmo;
    if(ok)n++; else break;
  }
  return n;
}

function schedStreak(){
  const s=loadLocal(); let n=0; const d=new Date();
  const total=AREAS.reduce((a,ar)=>a+ar.checks.length,0);
  for(let i=0;i<90;i++){
    if(i>0)d.setDate(d.getDate()-1);
    const k=d.toISOString().split('T')[0];
    const day=s.days&&s.days[k]; if(!day)break;
    const sl=day.scheduleLog,entries=sl?Object.values(sl):[];
    if(entries.length){
      const pts=entries.reduce((sum,e)=>sum+(e.status==='ontime'?2:e.status==='late'?1:0),0);
      if(pts/(entries.length*2)>=0.6)n++; else break;
    } else {
      const done=Object.values(day.checks||{}).filter(Boolean).length;
      if(total>0&&done/total>=0.7)n++; else break;
    }
  }
  return n;
}

}

function todayTodosHTML() {
  const tk = todayKey();
  const todos = getTodos().filter(t => t.date === tk);
  if (!todos.length) return '<div class="todo-empty">Nothing here yet</div>';

  // Smart surfacing: find relevant obj IDs for current block domain
  const activeDomain = getActiveDomain();
  const relevantObjs = activeDomain ? (DOMAIN_OBJ_MAP[activeDomain] || []) : [];

  const undone = todos.filter(t => !t.done);
  const done   = todos.filter(t => t.done);

  // Split undone into surfaced (relevant to current block) and rest
  const surfaced = undone.filter(t => t.objId && relevantObjs.includes(t.objId));
  const rest     = undone.filter(t => !surfaced.includes(t));

  const sorted = [...surfaced, ...rest, ...done];

  return sorted.map(t => {
    const isSurfaced = surfaced.includes(t);
    return `<div class="todo-item ${t.done ? 'ti-done' : ''} ${isSurfaced ? 'ti-surfaced' : ''}" data-id="${t.id}">

  mutate(s => {
    const tk = todayKey();
    if (s.logProgress && s.logProgress[tk]) {
      cards.forEach(id => { delete s.logProgress[tk][id]; });
    }
  });
  openCheckin();
}

function openCheckinSlot(slot) {
  // Force a specific slot regardless of time of day
  _forcedSlot = slot;
  openCheckin();
  _forcedSlot = null;
}

let _forcedSlot = null;

function openCheckin(){
  ciCards=buildCheckinCards();
  ciIdx=0; ciAnswers={}; ciSweep={};
  document.getElementById('checkin-overlay').style.display='block';
  document.body.style.overflow='hidden';
  renderCheckinCard();
}

function closeCheckin(){
  document.getElementById('checkin-overlay').style.display='none';
  document.body.style.overflow='';
  render();
}

function buildCheckinCards(){
  const h=new Date().getHours();
  const slot=_forcedSlot || (h<13?'morning':h<18?'midday':'evening');
  const s=getState(), tk=todayKey();

  const yesterday=new Date(); yesterday.setDate(yesterday.getDate()-1);
  const yk=yesterday.toISOString().split('T')[0];
  const undone=getTodos().filter(t=>t.date===yk&&!t.done);
  const rolloverCard=undone.length?[{id:'rollover',type:'rollover',q:`${undone.length} task${undone.length>1?'s':''} undone from yesterday`,hint:'Decide what to do with each one.',items:undone}]:[];

  const morning=[
    {id:'greet',type:'greeting'},
    ...rolloverCard,
    {id:'quit_m',type:'quit2',q:'Quit goals — how are you doing?',hint:'Be honest. Every clean day compounds.'},
    {id:'hair',type:'confirm',q:'Hair protocol done this morning?',hint:'Minoxidil + finasteride if Mon/Wed/Fri',domain:'appearance',checks:['minox'],pos:'Done ✓',neg:'Not yet'},
    {id:'walk',type:'confirm',q:'Walk with your dad?',hint:'Cool morning air — his preferred time',domain:'health',checks:['walk'],pos:'Done ✓',neg:'Not yet'},
    {id:'intention',type:'text',q:'Main intention for today?',hint:'One clear thing.',optional:true},
  ];
  const midday=[
    {id:'quit_mid',type:'quit2',q:'Quit check — still clean?',hint:'Quick midday check.'},
    {id:'morison_m',type:'rating3',q:'How did the Morison work block go?',domain:'social',checks:['morison_w'],opts:['Productive ✓','Partial','Skipped']},
    {id:'lunch',type:'confirm',q:'Ate a proper lunch?',hint:'No desk eating',pos:'Yes ✓',neg:'No / skipped'},
  ];
  const evening=[
    {id:'day_feel',type:'rating3',q:'How was today overall?',opts:['Strong day','Mixed','Tough day']},
    {id:'quit_e',type:'quit2',q:'End of day — quit goals?',hint:'Final check for today.'},
    {id:'sched_review',type:'sched_review',q:'Did you follow the schedule today?'},
    {id:'gamedev_note',type:'gamedev_note',q:'What moved in game dev today?',hint:'Optional one-liner.',optional:true},
    {id:'journal',type:'journal',optional:true},
  ];
  const seqs={morning,midday,evening};
  const done=s.logProgress[tk]||{};
  return (seqs[slot]||evening).filter(c=>!done[c.id]||c.type==='journal');
}

function setSweep(key,val){ ciSweep[key]=val; renderCheckinCard(); }

function ciPrev(){ if(ciIdx>0){ciIdx--;renderCheckinCard();} }

function ciNext(){
  const card=ciCards[ciIdx]; if(!card)return;
  // Commit card data
  if(card.type==='text'||card.type==='gamedev_note'){
    const el=document.getElementById('ci-ta-'+card.id);
    if(el&&el.value.trim()){
      ciAnswers[card.id]=el.value.trim();
      if(card.type==='gamedev_note'){
        mutate(s=>{s.days[todayKey()].comments.gaming=el.value.trim();});
      }
    }
  }
  if(card.type==='journal'){
    const el=document.getElementById('ci-journal');
    if(el&&el.value.trim()) mutate(s=>{s.days[todayKey()].journal=el.value;});
  }
  if(card.type==='sweep') commitSweep();
  if(card.type==='sched_review') commitSchedReview();
  if(card.type==='rollover') commitRollover(card.items||[]);
  // Mark progress
  mutate(s=>{s.logProgress[todayKey()][card.id]=true;});
  // Log entry
  addLogEntry(card);
  // Celebrations
  const s=loadLocal(); checkCelebrations(s); updatePersonalBests();
  ciIdx++; renderCheckinCard();
}

function answerConfirm(cardId,val){
  ciAnswers[cardId]=val;
  const card=ciCards.find(c=>c.id===cardId);
  if(card&&val==='yes'&&card.checks){
    mutate(s=>{const tk=todayKey();card.checks.forEach(cid=>{s.days[tk].checks[cid]=true;});});
  }
  renderCheckinCard();
  setTimeout(ciNext,350);
}

function answerRating3(cardId,idx){
  ciAnswers[cardId]=String(idx);
  const card=ciCards.find(c=>c.id===cardId);
  if(card&&card.domain){
    const ragVals=['green','amber','red'];
    mutate(s=>{s.days[todayKey()].manualRag[card.domain]=ragVals[idx];});
    if(idx===0&&card.checks) mutate(s=>{card.checks.forEach(cid=>{s.days[todayKey()].checks[cid]=true;});});
  }
  renderCheckinCard();
  setTimeout(ciNext,350);
}

function answerQuit2(cardId,track,val){
  ciAnswers[cardId+'_'+track]=val;
  if(track==='smoke'){
    if(val==='clean'){
      mutate(s=>{s.days[todayKey()].checks.no_smoke=true; if(!s.smokingStart)s.smokingStart=todayKey();});
    } else {
      mutate(s=>{s.smokingStart=todayKey();s.days[todayKey()].checks.no_smoke=false;});
      toast('Smoking streak reset. Tomorrow is day 1.');
    }
  }
  if(track==='pmo'){
    if(val==='clean'){
      mutate(s=>{s.days[todayKey()].checks.no_pmo=true; if(!s.pmoStart)s.pmoStart=todayKey();});
    } else {
      mutate(s=>{s.pmoStart=todayKey();s.days[todayKey()].checks.no_pmo=false;});
      toast('PMO streak reset. Tomorrow is day 1.');
    }
  }
  const sa=ciAnswers[cardId+'_smoke'],pa=ciAnswers[cardId+'_pmo'];
  if(sa&&pa){ciAnswers[cardId]='done';renderCheckinCard();setTimeout(ciNext,500);}
  else renderCheckinCard();
}

function commitSweep(){
  const ragMap={g:'green',am:'amber',r:'red'};
  mutate(s=>{
    const tk=todayKey();
    Object.entries(ciSweep).forEach(([key,val])=>{
      if(key.startsWith('sched_')||key.startsWith('roll_'))return;
      s.days[tk].manualRag[key]=ragMap[val]||'amber';
      if(val==='g'){
        const area=AREAS.find(a=>a.id===key);
        if(area)area.checks.filter(c=>isRelevant(c)).forEach(c=>{s.days[tk].checks[c.id]=true;});
      }
    });
  });
}

function commitSchedReview(){
  mutate(s=>{
    const tk=todayKey();
    if(!s.days[tk].scheduleLog)s.days[tk].scheduleLog={};
    const sched=getActiveSchedule(tk).filter(b=>!b.disabled);
    Object.entries(ciSweep).forEach(([key,val])=>{
      if(!key.startsWith('sched_'))return;
      const idx=parseInt(key.replace('sched_',''));
      const bl=sched[idx];
      if(bl)s.days[tk].scheduleLog[bl.t]={label:bl.label,status:val};
    });
  });
}

function commitRollover(items){
  const todos=getTodos();
  items.forEach(t=>{
    const dec=ciSweep['roll_'+t.id];
    const todo=todos.find(td=>td.id===t.id);
    if(!todo)return;
    if(dec==='today')todo.date=todayKey();
    else if(dec==='drop')todo.done=true;
  });
  saveTodos(todos);
}

// Ship log entries
function addLogEntry(card){
  const s=getState(),tk=todayKey();
  if(!s.days[tk].shipLog)s.days[tk].shipLog=[];
  const now=new Date();
  const timeStr=now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  let what='',answer='';
  if(card.type==='confirm'){what=card.q;answer=ciAnswers[card.id]==='yes'?card.pos||'Done':card.neg||'Not yet';}
  else if(card.type==='rating3'){what=card.q;const opts=card.opts||['Done','Partial','Skipped'];answer=opts[parseInt(ciAnswers[card.id])||0];}
  else if(card.type==='quit2'){what='Quit goals';const sa=ciAnswers[card.id+'_smoke'],pa=ciAnswers[card.id+'_pmo'];answer=`Smoking: ${sa==='clean'?'Clean':'Slipped'} · PMO: ${pa==='clean'?'Clean':'Slipped'}`;}
  else if(card.type==='text'&&ciAnswers[card.id]){what='Intention';answer=ciAnswers[card.id];}
  else if(card.type==='gamedev_note'&&ciAnswers[card.id]){what='Game dev';answer=ciAnswers[card.id];}
  else if(card.type==='sweep'){what='Domain sweep';answer='Logged';}
  else if(card.type==='sched_review'){what='Schedule review';answer='Logged';}
  else if(card.type==='journal'){what='Journal';answer='Written';}
  if(what){
    s.days[tk].shipLog.push({time:timeStr,what,answer,ts:now.toISOString()});
    saveLocal(s); cloudPush(s);
  }
}

        :`<button class="briefing-checkin-btn" onclick="openCheckin()">Start morning check-in</button>`}

function saveBlockLog(time, label, status) {
  const note = document.getElementById('block-note-inp');
  const noteVal = note ? note.value.trim() : '';
  const now = new Date();
  const timeStr = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  mutate(s => {
    const tk = todayKey();
    if (!s.days[tk].scheduleLog) s.days[tk].scheduleLog = {};
    s.days[tk].scheduleLog[time] = { label, status, note: noteVal };
    // Also add to ship log
    if (!s.days[tk].shipLog) s.days[tk].shipLog = [];
    const statusLabel = status === 'ontime' ? 'On time' : status === 'late' ? 'Started late' : 'Skipped';
    s.days[tk].shipLog.push({
      time: timeStr,
      what: label,
      answer: statusLabel + (noteVal ? ' — ' + noteVal : ''),
      ts: now.toISOString()
    });
  });
  renderToday();
}

let insightsWeekOffset=0;

function getWeekDates(offset){
  const now=new Date(), dow=now.getDay();
  // Week = Mon–Sun, with current week offset by `offset` (0=this week, -1=last week)
  const monday=new Date(now);
  monday.setDate(now.getDate()-((dow===0?7:dow)-1)+offset*7);
  monday.setHours(0,0,0,0);
  const days=[];
  for(let i=0;i<7;i++){
    const d=new Date(monday);d.setDate(monday.getDate()+i);
    days.push(d.toISOString().split('T')[0]);
  }
  return days;
}

function weekLabel(offset){
  if(offset===0)return 'This week';
  if(offset===-1)return 'Last week';
  const days=getWeekDates(offset);
  const d=new Date(days[0]);
  const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return d.getDate()+' '+MONTHS[d.getMonth()];
}

function generateSummaryLine(weekDays,s){
  const avgScores=AREAS.map(a=>{
    const scores=weekDays.map(k=>s.days&&s.days[k]?blendedScore(a.id,s.days[k]):null).filter(v=>v!==null);
    return{id:a.id,label:a.label,avg:scores.length?Math.round(scores.reduce((a,b)=>a+b,0)/scores.length):0};
  });
  const overallAvg=Math.round(avgScores.reduce((a,b)=>a+b.avg,0)/avgScores.length);
  const green=avgScores.filter(a=>a.avg>=70).length;
  const sd=s.smokingStart?ddiff(s.smokingStart):0;
  const pd=s.pmoStart?ddiff(s.pmoStart):0;
  const quitDays=weekDays.filter(k=>s.days&&s.days[k]&&s.days[k].checks&&s.days[k].checks.no_smoke&&s.days[k].checks.no_pmo).length;
  const loggedDays=weekDays.filter(k=>s.days&&s.days[k]&&Object.keys(s.days[k].checks||{}).length>0).length;

  if(loggedDays===0)return 'No data logged this week yet.';
  if(overallAvg>=75&&green>=5)return 'A strong week — you showed up across the board.';
  if(quitDays>=7)return '7 days clean on both goals. The streak is real.';
  if(quitDays>=5)return quitDays+' clean days on quit goals. Building momentum.';
  if(overallAvg<40)return 'This week was tough. The direction is still right.';
  const best=avgScores.sort((a,b)=>b.avg-a.avg)[0];
  const worst=avgScores.sort((a,b)=>a.avg-b.avg)[0];
  if(best.avg>=70&&worst.avg<40)return `Strong on ${best.label}. ${worst.label} needs attention next week.`;
  return 'A mixed week. Review what worked and what did not.';
}
