  else if (overall > 0 && overall < 40) document.body.classList.add('tough');

  // Slip banner
  const h = new Date().getHours();
  const slipKey = 'slip_dismissed_' + tk;
  let slipBanner = '';
  if (h >= 21 && day && !day.checks.no_smoke && !day.checks.no_pmo && !localStorage.getItem(slipKey)) {
    slipBanner = `<div class="slip-banner" style="margin-bottom:14px">
      <div class="sb-text"><strong>Quit goals not logged today</strong></div>
      <div class="sb-btns">
        <button class="sb-log" onclick="switchTab('today');openCheckin()">Log now</button>
        <button class="sb-dismiss" onclick="dismissSlip()">×</button>
      </div>
    </div>`;
  }

  // Objectives strip
  const objHTML = OBJECTIVES.map(function(obj, i) {
    var h = objHealth(obj);
    var rc = 'oc-' + h.rag;
    var dotsHTML = '';
    if (h.dots.length) {
      dotsHTML = '<div style="display:flex;gap:3px;margin-top:8px">'
        + h.dots.map(function(d) {
            return '<div style="width:7px;height:7px;border-radius:50%;background:' + (d ? 'var(--green)' : 'var(--cream3)') + '"></div>';
          }).join('')
        + '</div>';
    }
    var card = '<div class="obj-card ' + rc + '" onclick="editObj(' + JSON.stringify(obj.id) + ')">';
    card += '<div class="oc-num">0' + (i + 1) + '</div>';
    card += '<div class="oc-name">' + obj.label + '</div>';
    card += '<div class="oc-next">' + h.context + '</div>';
    card += dotsHTML + '</div>';
    return card;
  }).join('');

  // Streaks
  const sd = s.smokingStart ? ddiff(s.smokingStart) : null;
  const pd = s.pmoStart ? ddiff(s.pmoStart) : null;
  const ss = schedStreak(), mp = morningProtocolStreak();
  const bests = updatePersonalBests();

  function streakCard(num, label, sub, bestKey) {
    const isMilestone = num && MILESTONES.includes(num);
    const pb = bests && bests[bestKey] || 0;
    return `<div class="streak-card">
      <div class="sk-num ${isMilestone?'milestone':''}">${num !== null ? num : '—'}</div>
      <div class="sk-info">
        <div class="sk-label">${label}</div>
        <div class="sk-sub">${sub}</div>
        ${isMilestone ? `<div class="sk-milestone-text">${num} ${label.toLowerCase()} ✦</div>` : ''}
        ${pb > 0 && num !== pb ? `<div class="sk-sub">Best: ${pb}</div>` : ''}
      </div>
    </div>`;
  }

  const streaksHTML = [
    streakCard(sd, 'No smoking', sd !== null ? 'days clean' : 'tap Today to start', 'smoke'),
    streakCard(pd, 'No PMO', pd !== null ? pd + ' / 90 days' : 'tap Today to start', 'pmo'),
    streakCard(ss, 'Schedule streak', 'days on-time', 'sched'),
    streakCard(mp, 'Morning protocol', 'hair + walk + clean', 'morning'),
  ].join('');

  // Timeframe selector
  const now = new Date();
  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  let navHTML = '';
  if (lifeTimeframe === 'week') {
    const wdays = getWeekDates(lifeWeekOffset);
    const d0 = new Date(wdays[0] + 'T00:00:00'), d6 = new Date(wdays[6] + 'T00:00:00');
    const label = lifeWeekOffset === 0 ? 'This week' : lifeWeekOffset === -1 ? 'Last week' :
      d0.getDate() + ' ' + MONTHS[d0.getMonth()];
    navHTML = `<div class="life-week-nav">
      <button class="lwn-btn" onclick="lifeWeekOffset--;renderLife()">‹</button>
      <span class="lwn-label">${label}</span>
      <button class="lwn-btn" onclick="lifeWeekOffset++;renderLife()" ${lifeWeekOffset>=0?'disabled style="opacity:.35;cursor:default"':''}>›</button>
    </div>`;
  } else if (lifeTimeframe === 'month') {
    navHTML = `<div class="life-week-nav"><span class="lwn-label">${MONTHS[now.getMonth()]} ${now.getFullYear()}</span></div>`;
  } else {
    navHTML = `<div class="life-week-nav"><span class="lwn-label">${now.getFullYear()}</span></div>`;
  }

  const tfTabs = ['week','month','year'].map(t =>
    `<button class="tf-tab ${lifeTimeframe===t?'active':''}" onclick="lifeTimeframe='${t}';renderLife()">${t.charAt(0).toUpperCase()+t.slice(1)}</button>`
  ).join('');

  // Timeframe-specific content
  let tfContent = '';
  if (lifeTimeframe === 'week') tfContent = renderLifeWeek(s);
  else if (lifeTimeframe === 'month') tfContent = renderLifeMonth(s);
  else tfContent = renderLifeYear(s);

  shell.innerHTML = `
    ${slipBanner}
    <div class="life-sec">
      <div class="sec-label" style="margin-bottom:9px">Life objectives</div>
      <div class="life-obj-grid obj-grid">${objHTML}</div>
    </div>
    <div class="life-streaks streaks-row">${streaksHTML}</div>
    <div class="life-divider"></div>
    <div class="timeframe-row">
      <div class="timeframe-tabs">${tfTabs}</div>
      ${navHTML}
    </div>
    ${tfContent}
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px">
      <button class="export-btn" onclick="copyForClaude()">Copy for Claude ↗</button>
      <button class="btn" onclick="dlJSON()">Download backup</button>
    </div>
  `;
}

function renderLifeWeek(s) {
  const wdays = getWeekDates(lifeWeekOffset);
  const prevWdays = getWeekDates(lifeWeekOffset - 1);
  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const WDAYS_SHORT = ['S','M','T','W','T','F','S'];
  const d0 = new Date(wdays[0]+'T00:00:00'), d6 = new Date(wdays[6]+'T00:00:00');

  // Summary line
  const summaryLine = generateSummaryLine(wdays, s);

  // Domain bars
  const domBars = AREAS.map(area => {
    const scores = wdays.map(k => s.days&&s.days[k] ? blendedScore(area.id, s.days[k]) : null).filter(v => v !== null);
    const avg = scores.length ? Math.round(scores.reduce((a,b)=>a+b,0)/scores.length) : 0;
    const color = ragColor(avg);
    const allChecks = area.checks;
    const counts = {};
    allChecks.forEach(c => { counts[c.id] = {label:c.label, done:0, total:0}; });
    wdays.forEach(k => {
      const d = s.days&&s.days[k];
      allChecks.forEach(c => { counts[c.id].total++; if(d&&d.checks&&d.checks[c.id]) counts[c.id].done++; });
    });
    const sorted = Object.values(counts).filter(c=>c.total>0).sort((a,b)=>b.done/b.total - a.done/a.total);
    const best = sorted[0], worst = sorted[sorted.length-1];
    const sub = best&&best.done>0 ? `Most: ${best.label}${worst&&worst.done<worst.total?' · Missed: '+worst.label:''}` : 'No data this week';
    return `<div class="db-row">
      <div class="db-header"><div class="db-name">${area.label}</div><div class="db-score" style="color:${color}">${avg}%</div></div>
      <div class="db-bar"><div class="db-fill" style="width:${avg}%;background:${color}"></div></div>
      <div class="db-sub">${sub}</div>
    </div>`;
  }).join('');

  // Objectives movement
  const objMove = OBJECTIVES.map(obj => {
    const {score: curr} = objScore(obj);
    const prevScores = prevWdays.map(k => s.days&&s.days[k] ? blendedScore(obj.domain||'social', s.days[k]) : null).filter(v=>v!==null);
    const prev = prevScores.length ? Math.round(prevScores.reduce((a,b)=>a+b,0)/prevScores.length) : 0;
    const diff = curr - prev;
    const cls = diff>0?'up':diff<0?'dn':'same';
    const txt = diff>0?'↑'+diff+'%':diff<0?'↓'+Math.abs(diff)+'%':'—';
    const wTodos = getTodos().filter(t=>t.objId===obj.id&&t.done&&wdays.includes(t.date));
    return `<div class="lom-row">
      <div><div class="lom-name">${obj.label}</div>${wTodos.length?`<div class="lom-detail">${wTodos.length} task${wTodos.length>1?'s':''} completed</div>`:''}</div>
      <div style="text-align:right"><div class="lom-change ${cls}">${txt}</div><div style="font-family:var(--serif);font-size:13px;font-weight:700;color:var(--text)">${curr}%</div></div>
    </div>`;
  }).join('');

  // Tasks
  const allTodos = getTodos();
  const wDone = allTodos.filter(t=>t.done&&wdays.includes(t.date));
  const wOpen = allTodos.filter(t=>!t.done&&wdays.includes(t.date));
  const OBJ_LABELS = {finance:'Finance',merch:'Merch Sim',physical:'Physical',people:'People',women:'Connection'};
  const tasksDone = wDone.length ? wDone.map(t=>`<div class="ts-item">${t.text}${t.objId?`<div class="ts-obj">${OBJ_LABELS[t.objId]}</div>`:''}</div>`).join('') : '<div class="ts-empty">Nothing completed</div>';
  const tasksOpen = wOpen.length ? wOpen.map(t=>`<div class="ts-item">${t.text}${t.objId?`<div class="ts-obj">${OBJ_LABELS[t.objId]}</div>`:''}</div>`).join('') : '<div class="ts-empty">All clear</div>';

  // Quit timeline
  const sd = s.smokingStart ? ddiff(s.smokingStart) : null;
  const pd = s.pmoStart ? ddiff(s.pmoStart) : null;
  const bests = s.personalBests || {};
  function qDots(checkId) {
    return wdays.map((k,i) => {
      const d = s.days&&s.days[k];
      const logged = d && Object.keys(d.checks||{}).length > 0;
      const clean = d&&d.checks&&d.checks[checkId];
      const cls = !logged?'qd-none':clean?'qd-clean':'qd-slip';
      return `<div class="qt-dot ${cls}" title="${k}"></div>`;
    }).join('');
  }

  // Moments
  const wMoments = [];
  wdays.forEach(k => { const d=s.days&&s.days[k]; if(d&&d.moments) d.moments.forEach(m=>wMoments.push({date:k,text:m.text})); });

  // Journal
  const wJournals = wdays.map(k=>({date:k,text:s.days&&s.days[k]&&s.days[k].journal})).filter(e=>e.text);

  // Reflection
  const isSunday = new Date().getDay()===0;
  const existingRef = s.weeklyReflections&&s.weeklyReflections[wdays[0]];

  return `
    <div class="week-summary-card">
      <div class="wsc-period">${d0.getDate()} ${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d0.getMonth()]} — ${d6.getDate()} ${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d6.getMonth()]}</div>
      <div class="wsc-text">${summaryLine}</div>
    </div>

    <div class="life-sec">
      <div class="life-sec-hd"><span class="sec-label">Domain averages</span></div>
      <div class="life-domain-bars domain-bars">${domBars}</div>
    </div>

    <div class="life-sec">
      <div class="life-sec-hd"><span class="sec-label">Objectives — what moved</span></div>
      <div class="life-obj-movement">${objMove}</div>
    </div>

    <div class="life-sec">
      <div class="life-sec-hd"><span class="sec-label">Tasks</span></div>
      <div class="life-tasks-split tasks-split">
        <div class="ts-col"><div class="ts-title">Done (${wDone.length})</div>${tasksDone}</div>
        <div class="ts-col"><div class="ts-title">Still open (${wOpen.length})</div>${tasksOpen}</div>
      </div>
    </div>

    <div class="life-sec">
      <div class="life-sec-hd"><span class="sec-label">Quit goals</span></div>
      <div class="quit-tl quit-timeline">
        <div class="qt-row">
          <div class="qt-label"><div class="qt-name">Smoking</div><div class="qt-streak" style="color:var(--d-quit)">${sd!==null?sd+'d':'—'}</div></div>
          <div class="qt-dots">${qDots('no_smoke')}</div>
          <div class="qt-day-label">${wdays.map(k=>`<div class="qt-dl">${WDAYS_SHORT[new Date(k+'T00:00:00').getDay()]}</div>`).join('')}</div>
          ${bests.smoke>0?`<div class="qt-pb">Personal best: ${bests.smoke} days</div>`:''}
        </div>
        <div class="qt-row">
          <div class="qt-label"><div class="qt-name">PMO</div><div class="qt-streak" style="color:var(--d-appearance)">${pd!==null?pd+'d':'—'}</div></div>
          <div class="qt-dots">${qDots('no_pmo')}</div>
          <div class="qt-day-label">${wdays.map(k=>`<div class="qt-dl">${WDAYS_SHORT[new Date(k+'T00:00:00').getDay()]}</div>`).join('')}</div>
          ${bests.pmo>0?`<div class="qt-pb">Personal best: ${bests.pmo} days</div>`:''}
        </div>
      </div>
    </div>

    ${wMoments.length ? `<div class="life-sec">
      <div class="life-sec-hd"><span class="sec-label">Moments</span></div>
      <div class="life-moments">${wMoments.map(m=>`<div class="lm-item">
        <div class="lm-date">${new Date(m.date+'T00:00:00').toLocaleDateString([],{weekday:'short',day:'numeric'})}</div>
        <div class="lm-text">${m.text}</div>
      </div>`).join('')}</div>
    </div>` : ''}

    ${wJournals.length ? `<div class="life-sec">
      <div class="life-sec-hd"><span class="sec-label">Journal</span></div>
      <div class="life-journal">${wJournals.map(e=>`<div class="lj-item" onclick="this.classList.toggle('open')">
        <div class="lj-hd">
          <div class="lj-date">${new Date(e.date+'T00:00:00').toLocaleDateString([],{weekday:'long',day:'numeric'})}</div>
          <div class="lj-preview">${e.text}</div>
          <div class="lj-chev">▾</div>
        </div>
        <div class="lj-body">${e.text}</div>
      </div>`).join('')}</div>
    </div>` : ''}

    ${(isSunday||lifeWeekOffset===0) ? `<div class="life-reflection">
      <div class="lr-title">Weekly reflection</div>
      <div class="lr-sub">Optional. The honest story of this week.</div>
      <textarea style="min-height:80px;font-size:13px;line-height:1.7;width:100%;background:var(--cream2);border:1px solid var(--border);border-radius:var(--r);padding:10px;outline:none;font-family:var(--sans);resize:vertical" id="weekly-ref" placeholder="This week...">${existingRef||''}</textarea>
      <div style="display:flex;justify-content:flex-end;margin-top:7px">
        <button class="btn ok" onclick="saveWeeklyRef('${wdays[0]}')">Save</button>
      </div>
    </div>` : ''}`;
}

function renderLifeMonth(s) {
  const now = new Date();
  const year = now.getFullYear(), month = now.getMonth();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const days = Array.from({length: daysInMonth}, (_, i) => {
    const d = new Date(year, month, i+1);
    return d.toISOString().split('T')[0];
  });

  // Domain trend (30 dots per domain)
  const trendRows = AREAS.map(area => {
    const dots = days.map((k, i) => {
      const d = s.days&&s.days[k];
      const sc = d ? blendedScore(area.id, d) : null;
      const cls = sc===null?'':(sc>=70?'g':sc>=40?'am':'r');
      const isToday = k === todayKey();
      return `<div class="mt-dot ${cls} ${isToday?'today-dot':''}" title="${k}"></div>`;
    }).join('');
    const scores = days.map(k=>s.days&&s.days[k]?blendedScore(area.id,s.days[k]):null).filter(v=>v!==null);
    const avg = scores.length ? Math.round(scores.reduce((a,b)=>a+b,0)/scores.length) : 0;
    return `<div class="mt-row">
      <div class="mt-label">${area.label}</div>
      <div class="mt-dots">${dots}</div>
      <div class="mt-score" style="color:${ragColor(avg)}">${avg}%</div>
    </div>`;
  }).join('');

  // 30-day streak grids
  const smkDots = days.map(k => {
    const d = s.days&&s.days[k];
    const logged = d&&Object.keys(d.checks||{}).length>0;
    const clean = d&&d.checks&&d.checks.no_smoke;
    return `<div class="smg-dot ${!logged?'':clean?'clean':'slip'}" title="${k}"></div>`;
  }).join('');
  const pmoDots = days.map(k => {
    const d = s.days&&s.days[k];
    const logged = d&&Object.keys(d.checks||{}).length>0;
    const clean = d&&d.checks&&d.checks.no_pmo;
    return `<div class="smg-dot ${!logged?'':clean?'clean':'slip'}" title="${k}"></div>`;
  }).join('');

  // Tasks this month
  const allTodos = getTodos();
  const OBJ_LABELS = {finance:'Finance',merch:'Merch Sim',physical:'Physical',people:'People',women:'Connection'};
  const mDone = allTodos.filter(t=>t.done&&days.includes(t.date));
  const byObj = {};
  mDone.forEach(t => { const k=t.objId||'other'; byObj[k]=(byObj[k]||0)+1; });
  const taskRows = Object.entries(byObj).sort((a,b)=>b[1]-a[1]).map(([k,v])=>
    `<div style="display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border)">
      <span style="font-size:13px;color:var(--text2)">${OBJ_LABELS[k]||'Other'}</span>
      <span style="font-family:var(--serif);font-size:14px;font-weight:700;color:var(--text)">${v}</span>
    </div>`).join('') || '<div style="font-size:13px;color:var(--text3);font-style:italic;padding:8px 0">No completed tasks this month</div>';

  // Moments this month
  const mMoments = [];
  days.forEach(k => { const d=s.days&&s.days[k]; if(d&&d.moments) d.moments.forEach(m=>mMoments.push({date:k,text:m.text})); });

  return `
    <div class="life-sec">
      <div class="life-sec-hd"><span class="sec-label">Domain trends — ${new Date(year,month).toLocaleDateString([],{month:'long'})}</span></div>
      <div class="month-trend-grid">${trendRows}</div>
    </div>
    <div class="life-sec">
      <div class="life-sec-hd"><span class="sec-label">Quit goals — ${daysInMonth}-day view</span></div>
      <div class="streak-month-grid">
        <div class="smg-row"><div class="smg-label">No smoking</div><div class="smg-dots">${smkDots}</div></div>
        <div class="smg-row"><div class="smg-label">No PMO</div><div class="smg-dots">${pmoDots}</div></div>
      </div>
    </div>
    <div class="life-sec">
      <div class="life-sec-hd"><span class="sec-label">Tasks completed by objective</span></div>
      <div class="settings-card" style="padding:0 14px">${taskRows}</div>
    </div>
    ${mMoments.length ? `<div class="life-sec">
      <div class="life-sec-hd"><span class="sec-label">Moments this month</span></div>
      <div class="life-moments">${mMoments.slice(-10).map(m=>`<div class="lm-item">
        <div class="lm-date">${new Date(m.date+'T00:00:00').toLocaleDateString([],{day:'numeric',month:'short'})}</div>
        <div class="lm-text">${m.text}</div>
      </div>`).join('')}</div>
    </div>` : ''}`;
}

function renderLifeYear(s) {
  const now = new Date();
  const year = now.getFullYear();
  const MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  // Get all days for this year
  const domainMonthAvgs = AREAS.map(area => {
    const monthAvgs = MONTHS_SHORT.map((_, mi) => {
      const daysInM = new Date(year, mi+1, 0).getDate();
      const scores = Array.from({length:daysInM},(_,di)=>{
        const k = new Date(year,mi,di+1).toISOString().split('T')[0];
        return s.days&&s.days[k] ? blendedScore(area.id,s.days[k]) : null;
      }).filter(v=>v!==null);
      return scores.length ? Math.round(scores.reduce((a,b)=>a+b,0)/scores.length) : 0;
    });
    const overall = monthAvgs.filter(v=>v>0);
    const avg = overall.length ? Math.round(overall.reduce((a,b)=>a+b,0)/overall.length) : 0;
    const bars = monthAvgs.map((v, mi) => {
      const color = v>=70?'var(--green)':v>=40?'var(--amber)':v>0?'var(--red)':'var(--cream2)';
      const h = Math.round(v/100*44) + 4;
      return `<div class="ydm-col">
        <div class="ydm-bar-wrap"><div class="ydm-bar" style="height:${h}px;background:${color}"></div></div>
        <div class="ydm-lbl">${MONTHS_SHORT[mi]}</div>
      </div>`;
    }).join('');
    return `<div class="year-domain-row">
      <div class="ydr-header"><div class="ydr-name">${area.label}</div><div class="ydr-avg" style="color:${ragColor(avg)}">${avg}%</div></div>
      <div class="ydr-months">${bars}</div>
    </div>`;
  }).join('');

  // Milestones reached this year
  const msReached = [];
  OBJECTIVES.forEach(obj => {
    const od = s.objectives&&s.objectives[obj.id]||{};
    (od.milestones||[]).forEach((done,i) => {
      if (done && obj.milestones[i]) msReached.push(`${obj.label} — ${obj.milestones[i]}`);
    });
  });

  // Total tasks by objective this year
  const allTodos = getTodos();
  const OBJ_LABELS = {finance:'Finance',merch:'Merch Sim',physical:'Physical',people:'People',women:'Connection'};
  const yearDone = allTodos.filter(t => t.done && t.date && t.date.startsWith(String(year)));
  const byObj = {};
  yearDone.forEach(t => { const k=t.objId||'other'; byObj[k]=(byObj[k]||0)+1; });

  return `
    <div class="life-sec">
      <div class="life-sec-hd"><span class="sec-label">Domain health — ${year}</span></div>
      <div class="year-grid">${domainMonthAvgs}</div>
    </div>
    ${msReached.length ? `<div class="life-sec">
      <div class="life-sec-hd"><span class="sec-label">Milestones reached</span></div>
      <div class="settings-card" style="padding:0 14px">
        ${msReached.map(m=>`<div style="font-size:13px;color:var(--text2);padding:8px 0;border-bottom:1px solid var(--border)">✓ ${m}</div>`).join('')}
      </div>
    </div>` : ''}
    ${Object.keys(byObj).length ? `<div class="life-sec">
      <div class="life-sec-hd"><span class="sec-label">Tasks shipped — ${year}</span></div>
      <div class="settings-card" style="padding:0 14px">
        ${Object.entries(byObj).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)">
          <span style="font-size:13px;color:var(--text2)">${OBJ_LABELS[k]||'Other'}</span>
          <span style="font-family:var(--serif);font-size:16px;font-weight:700;color:var(--text)">${v}</span>
        </div>`).join('')}
      </div>
    </div>` : ''}`;
}

function saveWeeklyRef(weekKey) {
  const el = document.getElementById('weekly-ref'); if (!el) return;
  mutate(s => { if(!s.weeklyReflections)s.weeklyReflections={}; s.weeklyReflections[weekKey]=el.value; });
  const btn = document.querySelector('.life-reflection .btn');
  if (btn) { btn.textContent='Saved ✓'; setTimeout(()=>btn.textContent='Save',2000); }
}

let settingsSchedDay = new Date().getDay();
let openTplBlock = null;
let openObjSettings = null;

function getPersonal() {

function savePersonal(p) { localStorage.setItem('kevos_personal', JSON.stringify(p)); }

  const shell = document.getElementById('settings-shell');

    ${renderSettingsYou(p, binId, apiKey)}
    ${renderSettingsObjectives()}
    ${renderSettingsSchedule(s)}

}

function renderSettingsObjectives() {
  const s = getState();

    let bodyHTML = '';
    if (isOpen) {

        const msRows = obj.milestones.map((m, mi) => {
          const done = !!(od.milestones || [])[mi];
          return `<div class="ms-item ${done?'done':''}" onclick="toggleMsSettings('${obj.id}',${mi})">

        }).join('');
        bodyHTML = `

          <div class="ms-list">${msRows}</div>

      } else {

function renderSettingsSchedule(s) {
  const WDAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const SHORT  = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const todayDow = new Date().getDay();
  const dow = settingsSchedDay;
  const tk = todayKey();

  const blocks = s.schedTemplates && s.schedTemplates[dow]
    ? s.schedTemplates[dow]
    : DEFAULT_SCHEDULES[dow] || [];

  const isCustomised = !!(s.schedTemplates && s.schedTemplates[dow]);

  const daySel = SHORT.map((d, i) => `<button class="day-pill ${i===dow?'active':''} ${i===todayDow&&i!==dow?'today-day':''}"
    onclick="settingsSchedDay=${i};renderSettings()">${d}</button>`).join('');

  const blockRows = blocks.map((bl, i) => {
    const isOpen = openTplBlock === `${dow}-${i}`;
    const DOMAIN_OPTS = ['','appearance','health','social','gaming','dating','finance']
      .map(d => `<option value="${d}" ${bl.domain===d?'selected':''}>${d||'No domain'}</option>`).join('');
    return `<div class="tpl-block ${isOpen?'open':''}" id="tpl-${dow}-${i}">
      <div class="tpl-block-hd" onclick="toggleTplBlock(${dow},${i})">
        <div class="tpl-dot ${!bl.disabled?'on':''}"></div>
        <div class="tpl-time" id="tpl-t-${dow}-${i}">${bl.t}</div>
        <div class="tpl-name" style="${bl.disabled?'text-decoration:line-through;color:var(--text3)':''}">${bl.label}</div>
        ${bl.domain?`<div class="tpl-domain">${bl.domain}</div>`:''}
        <div class="tpl-chevron">▾</div>
      </div>
      ${isOpen ? `<div class="tpl-block-body">
        <div class="tpl-time-row">
          <label>Time</label>
          <input type="range" min="360" max="1439" step="15" value="${toMins(bl.t)}"
            oninput="updateTplTime(${dow},${i},this.value)"
            onchange="saveTplBlock(${dow},${i})">
          <div class="tpl-time-val" id="tpl-tv-${dow}-${i}">${bl.t}</div>
        </div>
        <input type="text" value="${bl.label}" id="tpl-n-${dow}-${i}" placeholder="Block name..."
          onchange="saveTplBlock(${dow},${i})" style="margin-top:6px;font-size:13px">
        <select id="tpl-d-${dow}-${i}" onchange="saveTplBlock(${dow},${i})"
          style="margin-top:6px;font-size:12px;padding:7px 10px;background:var(--cream2);border:1px solid var(--border);border-radius:var(--r);color:var(--text2);font-family:var(--sans);outline:none;width:100%">
          ${DOMAIN_OPTS}
        </select>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:8px;border-top:1px solid var(--border)">
          <label style="font-size:12px;color:var(--text2);font-family:var(--sans)">
            <input type="checkbox" ${bl.disabled?'checked':''} onchange="toggleTplEnabled(${dow},${i})"> Disabled
          </label>
          <div style="display:flex;gap:6px">
            <button class="btn" onclick="saveTplBlock(${dow},${i});toggleTplBlock(${dow},${i})">Save</button>
            ${bl.custom?`<button class="btn danger" onclick="deleteTplBlock(${dow},${i})">Delete</button>`:''}
          </div>
        </div>
      </div>` : ''}
    </div>`;
  }).join('');

  const copyOpts = SHORT.map((d, i) => i !== dow ? `<option value="${i}">Copy from ${d}</option>` : '').join('');

  return `<div class="settings-section">
    <div class="settings-section-title">Weekly schedule templates</div>
    <div class="day-selector">${daySel}</div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px">
      <div>
        <div style="font-family:var(--serif);font-size:15px;font-weight:600;color:var(--text)">${WDAYS[dow]}</div>
        <div style="font-size:11px;color:var(--text3);margin-top:1px">${blocks.length} blocks${isCustomised?' · customised':' · default'}</div>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <div style="display:flex;gap:4px;align-items:center">
          <select class="tpl-copy-sel" id="copy-from-sel"><option value="">Copy from...</option>${copyOpts}</select>
          <button class="btn" onclick="copyTplFrom()">Copy</button>
        </div>
        ${isCustomised?`<button class="btn danger" onclick="resetTplDay(${dow})">Reset to default</button>`:''}
      </div>
    </div>
    ${blockRows}
    <div class="tpl-add-row" onclick="addTplBlock(${dow})">
      <div class="tpl-add-icon">+</div>
      <div class="tpl-add-text">Add a block to every ${WDAYS[dow]}</div>

function renderSettingsStreaks(s) {
  const sd = s.smokingStart ? ddiff(s.smokingStart) : null;
  const pd = s.pmoStart ? ddiff(s.pmoStart) : null;
  const bests = s.personalBests || {};

  function streakRow(label, num, startKey, startDate, bestKey) {
    const best = bests[bestKey] || 0;
    return `<div class="streak-settings-row">
      <div class="str-info">
        <div class="str-name">${label}</div>
        <div class="str-num">${num !== null ? num : '—'}</div>
        <div class="str-sub">${num !== null ? `Started ${startDate}` : 'Not started yet'}${best > 0 ? ` · Best: ${best} days` : ''}</div>
        ${num !== null ? `<div style="margin-top:8px;display:flex;align-items:center;gap:6px;flex-wrap:wrap">
          <span style="font-size:11px;color:var(--text3)">Backdate start:</span>
          <input type="date" id="${startKey}-date" value="${startDate||todayKey()}"
            style="font-size:11px;padding:4px 8px;width:auto;background:var(--cream2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:var(--sans)">
          <button class="btn" style="padding:4px 9px;font-size:11px" onclick="backdateStreak('${startKey}')">Update</button>
        </div>` : ''}
      </div>
      <div class="str-btns">
        ${num === null ? `<button class="btn ok" onclick="startStreak('${startKey}');renderSettings()">Start streak</button>` :
          `<button class="btn danger" onclick="if(confirm('Reset ${label.toLowerCase()} streak to today?')){resetStreak('${startKey}');renderSettings()}">Reset</button>`}
      </div>
    </div>`;
  }

  return `<div class="settings-section">
    <div class="settings-section-title">Streaks</div>
    <div class="settings-card">
      ${streakRow('No smoking', sd, 'smoke', s.smokingStart, 'smoke')}

    </div>
  </div>`;
}

// ── Settings action handlers ──────────────────

function saveName() {
  const el = document.getElementById('s-name'); if (!el) return;
  const p = getPersonal(); p.name = el.value.trim(); savePersonal(p);
  toast('Name saved.');
}

function saveTz() {
  const el = document.getElementById('s-tz'); if (!el) return;
  const p = getPersonal(); p.tz = el.value; savePersonal(p);
  toast('Timezone saved.');
}

function saveCloudSettings() {
  const b = document.getElementById('s-bin').value.trim();
  const k = document.getElementById('s-key').value.trim();
  if (!b || !k) { toast('Enter both Bin ID and Master Key.'); return; }
  localStorage.setItem('kv_bin', b); localStorage.setItem('kv_key', k);
  toast('Saved — syncing...'); cloudPull().then(() => renderSettings());
}

function toggleObjSettings(id) {
  openObjSettings = openObjSettings === id ? null : id;
  renderSettings();
}

function toggleMsSettings(id, idx) {
  mutate(s => {
    if (!s.objectives[id].milestones) s.objectives[id].milestones = [];
    s.objectives[id].milestones[idx] = !s.objectives[id].milestones[idx];
  });
  renderSettings();
}

function saveObjNoteSettings(id) {
  const el = document.getElementById('on-' + id); if (!el) return;
  mutate(s => { s.objectives[id].note = el.value; });
  toast('Saved.');
}

// Template schedule handlers
function toggleTplBlock(dow, idx) {
  const key = `${dow}-${idx}`;
  openTplBlock = openTplBlock === key ? null : key;
  renderSettings();
}

function updateTplTime(dow, idx, val) {
  const t = minsToTime(parseInt(val));
  const el = document.getElementById(`tpl-tv-${dow}-${idx}`);
  const el2 = document.getElementById(`tpl-t-${dow}-${idx}`);
  if (el) el.textContent = t;
  if (el2) el2.textContent = t;
}

function saveTplBlock(dow, idx) {
  const s = getState();
  if (!s.schedTemplates) s.schedTemplates = {};
  if (!s.schedTemplates[dow]) {
    s.schedTemplates[dow] = JSON.parse(JSON.stringify(DEFAULT_SCHEDULES[dow] || []));
  }
  const slider = document.querySelector(`#tpl-${dow}-${idx} input[type=range]`);
  const nameInp = document.getElementById(`tpl-n-${dow}-${idx}`);
  const domSel  = document.getElementById(`tpl-d-${dow}-${idx}`);
  if (slider) s.schedTemplates[dow][idx].t = minsToTime(parseInt(slider.value));
  if (nameInp && nameInp.value.trim()) s.schedTemplates[dow][idx].label = nameInp.value.trim();
  if (domSel)  s.schedTemplates[dow][idx].domain = domSel.value || null;
  s.schedTemplates[dow].sort((a, b) => toMins(a.t) - toMins(b.t));
  saveLocal(s); cloudPush(s);
  renderSettings();
}

function toggleTplEnabled(dow, idx) {
  const s = getState();
  if (!s.schedTemplates) s.schedTemplates = {};
  if (!s.schedTemplates[dow]) {
    s.schedTemplates[dow] = JSON.parse(JSON.stringify(DEFAULT_SCHEDULES[dow] || []));
  }
  s.schedTemplates[dow][idx].disabled = !s.schedTemplates[dow][idx].disabled;
  saveLocal(s); cloudPush(s);
  renderSettings();
}

function addTplBlock(dow) {
  const s = getState();
  if (!s.schedTemplates) s.schedTemplates = {};
  if (!s.schedTemplates[dow]) {
    s.schedTemplates[dow] = JSON.parse(JSON.stringify(DEFAULT_SCHEDULES[dow] || []));
  }
  s.schedTemplates[dow].push({ t: '12:00', label: 'New block', domain: null, custom: true });
  s.schedTemplates[dow].sort((a, b) => toMins(a.t) - toMins(b.t));
  saveLocal(s); cloudPush(s);
  openTplBlock = `${dow}-${s.schedTemplates[dow].length - 1}`;
  renderSettings();
}

function deleteTplBlock(dow, idx) {
  const s = getState();
  if (s.schedTemplates && s.schedTemplates[dow]) {
    s.schedTemplates[dow].splice(idx, 1);
    saveLocal(s); cloudPush(s);
  }
  openTplBlock = null;
  renderSettings();
}

function resetTplDay(dow) {
  if (!confirm('Reset this day to the built-in default?')) return;
  const s = getState();
  if (s.schedTemplates) delete s.schedTemplates[dow];
  saveLocal(s); cloudPush(s);
  openTplBlock = null;
  renderSettings();
  toast('Reset to default.');
}

function copyTplFrom() {
  const sel = document.getElementById('copy-from-sel');
  if (!sel || !sel.value) return;
  const fromDow = parseInt(sel.value);
  const fromBlocks = JSON.parse(JSON.stringify(DEFAULT_SCHEDULES[fromDow] || []));
  const s = getState();
  if (!s.schedTemplates) s.schedTemplates = {};
  // Check if source has a custom template
  const source = (s.schedTemplates && s.schedTemplates[fromDow]) || fromBlocks;
  s.schedTemplates[settingsSchedDay] = JSON.parse(JSON.stringify(source));
  saveLocal(s); cloudPush(s);
  openTplBlock = null;
  renderSettings();
  const WDAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  toast('Copied from ' + WDAYS[fromDow] + '.');
}

function backdateStreak(type) {
  const el = document.getElementById(type + '-date');
  if (!el || !el.value) return;
  mutate(s => {
    if (type === 'smoke') s.smokingStart = el.value;
    else s.pmoStart = el.value;
  });
  renderSettings();
  toast('Start date updated.');
}

function toggleNotif(type, val) {
  if (type === 'sched') localStorage.setItem('kevnotifs', val ? 'on' : 'off');
  if (type === 'slip') localStorage.setItem('kevslipnotif', val ? 'on' : 'off');
  if (val) initNotifs();
}

async function requestNotifPermission() {
  const p = await Notification.requestPermission();
  notifsOn = p === 'granted';
  const el = document.getElementById('notif-perm-status');
  if (el) el.textContent = p === 'granted' ? 'Granted' : p === 'denied' ? 'Denied by browser' : 'Not granted';
  toast(p === 'granted' ? 'Notifications enabled.' : 'Permission not granted.');
}

function updateNotifPermStatus() {
  const el = document.getElementById('notif-perm-status');
  if (!el) return;
  if (!('Notification' in window)) { el.textContent = 'Not supported in this browser'; return; }
  el.textContent = Notification.permission === 'granted' ? 'Granted' :
    Notification.permission === 'denied' ? 'Denied — change in browser settings' : 'Not yet requested';
}

}

function saveCloud(){ const b=document.getElementById('set-bin').value.trim(),k=document.getElementById('set-key').value.trim(); if(!b||!k){toast('Enter both fields.');return;} localStorage.setItem('kv_bin',b);localStorage.setItem('kv_key',k); closeModal();toast('Saved — syncing...');cloudPull(); }
function startStreak(type){ mutate(s=>{if(type==='smoke')s.smokingStart=todayKey();else s.pmoStart=todayKey();}); toast(type==='smoke'?'Smoking streak started.':'PMO streak started — 90 days.'); render(); }
function resetStreak(type){ mutate(s=>{if(type==='smoke')s.smokingStart=todayKey();else s.pmoStart=todayKey();}); closeModal(); toast('Reset. Tomorrow is day 1.'); render(); }
function dlJSON(){ const s=loadLocal(),bl=new Blob([JSON.stringify(s,null,2)],{type:'application/json'}); const a=document.createElement('a');a.href=URL.createObjectURL(bl);a.download=`kevos-${todayKey()}.json`;a.click(); toast('Downloaded.'); }
function showImport(){ showModal('Import',`<textarea id="imp-ta" style="min-height:120px" placeholder='{"days":{...'></textarea><div class="btn-row"><button class="btn ok" onclick="doImport()">Import</button><button class="btn" onclick="closeModal()">Cancel</button></div>`); }
function doImport(){ try{const v=JSON.parse(document.getElementById('imp-ta').value);saveLocal(v);closeModal();render();toast('Imported.');cloudPush(v);}catch{toast('Invalid JSON.');} }

function copyForClaude(){
  const s=loadLocal(),days=s.days||{},keys=Object.keys(days).sort();
  const daily=keys.map(k=>{const d=days[k],areas={};AREAS.forEach(a=>{areas[a.id]=blendedScore(a.id,d);});return{date:k,areas,journal:d.journal||'',moments:d.moments||[],shipLog:d.shipLog||[]};});
  const objProg=OBJECTIVES.map(o=>{const{score,next}=objScore(o);return{id:o.id,label:o.label,score,next};});
  const txt=`# Kev OS export — ${new Date().toDateString()}
Paste into Claude: "Analyse my life tracking data. What patterns do you see? Which areas am I neglecting?"

## Streaks
Smoking: ${ddiff(s.smokingStart)} days · PMO: ${ddiff(s.pmoStart)}/90

## Objectives
${JSON.stringify(objProg,null,2)}

## Daily data (${daily.length} days)
${JSON.stringify(daily,null,2)}

## Moments
${daily.flatMap(r=>r.moments.map(m=>'['+r.date+'] '+m.text)).join('\n')}

## Journals
${daily.filter(r=>r.journal).map(r=>'['+r.date+'] '+r.journal).join('\n')}`;
  navigator.clipboard.writeText(txt).then(()=>toast('Copied — paste into Claude.')).catch(()=>showModal('Export',`<textarea style="min-height:180px;font-size:11px">${txt}</textarea>`));
}

//
//  NOTIFICATIONS
//
let notifsOn=false,notifFired={};
async function initNotifs(){
  if(localStorage.getItem('kevnotifs')!=='on')return;
  const p=await Notification.requestPermission();
  if(p==='granted')notifsOn=true;
}
function checkNotifs(){
  if(!notifsOn)return;
  const m=nowMins(),today=todayKey();
  getActiveSchedule(today).filter(b=>!b.disabled).forEach(bl=>{
    const key=`${today}-${bl.t}`;
    if(Math.abs(m-toMins(bl.t))<=1&&!notifFired[key]){
      notifFired[key]=true;
      new Notification('Kev OS',{body:bl.t+'  ·  '+bl.label,tag:key});
    }
  });
  // Slip notification at 21:30
  const tk=todayKey(),day=loadLocal().days&&loadLocal().days[tk];
  const slipKey='slip_notif_'+tk;
  if(m>=21*60+30&&!notifFired[slipKey]&&day&&!day.checks.no_smoke&&!day.checks.no_pmo){
    notifFired[slipKey]=true;
    new Notification('Kev OS',{body:'Quit goals not logged today — tap to log before midnight.',tag:slipKey});
  }
}

//
//  VIEW SWITCHING
//
let activeTab='today';
function switchTab(v){
  activeTab=v;
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('on'));
  const vEl=document.getElementById('view-'+v); if(vEl)vEl.classList.add('on'); else return;
  document.querySelectorAll('.dtab').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.dtab').forEach(el=>{ if(el.textContent.toLowerCase().startsWith(v.substring(0,3)))el.classList.add('active'); });
  document.querySelectorAll('.tbar-btn').forEach(el=>el.classList.remove('active'));
  const tb=document.getElementById('tb-'+v); if(tb)tb.classList.add('active');
  if(v==='settings'){renderSettings();setTimeout(updateNotifPermStatus,100);}
  if(v==='life')renderLife();
  render();
}

//
//  MODAL + TOAST
//
function showModal(title,html){
  const bg=document.createElement('div'); bg.className='modal-bg'; bg.id='_modal';
  bg.onclick=e=>{if(e.target===bg)closeModal();};
  bg.innerHTML=`<div class="modal"><div class="modal-hd"><h3>${title}</h3><button class="modal-x" onclick="closeModal()">×</button></div>${html}</div>`;
  document.body.appendChild(bg);
}
function closeModal(){ const m=document.getElementById('_modal'); if(m)m.remove(); }
function toast(msg){ const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),3000); }

//
//  MAIN RENDER
//
function render(){
  const now=new Date();
  const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const WDAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const htime=document.getElementById('h-time'),hdate=document.getElementById('h-date');
  if(htime)htime.textContent=now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  if(hdate)hdate.textContent=WDAYS[now.getDay()]+' · '+now.getDate()+' '+MONTHS[now.getMonth()];
  if(activeTab==='today')renderToday();
  else if(activeTab==='life')renderLife();
  else if(activeTab==='settings')renderSettings();
}

//
//  INIT
//
async function initApp(){
  await initNotifs();
  render();
  const {binId,apiKey}=getConfig();
  if(binId&&apiKey)cloudPull(); else setSyncUI('','local only');
  setInterval(render,30000);
  setInterval(function(){
    const htime=document.getElementById('h-time');
    if(htime)htime.textContent=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    checkNotifs();
  },30000);
}
initApp();
</script>
